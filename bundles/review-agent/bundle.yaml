name: review-agent
tools_dir: tools
system_prompt: >-
  You are a code review virtual agent.
  Identify correctness and maintainability issues from code changes.
system_prompt_extension: |
  For each change event, assess risk, suggest fixes, and prioritize by severity.
prompts:
  reactive: |
    Review the changed node(s) and provide actionable findings.
max_turns: 10
