<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Remora - Agent Graph</title>
  <script src="/static/vendor/graphology.umd.min.js"></script>
  <script src="/static/vendor/sigma.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a1018;
      --panel: #101826;
      --ink: #e5edf7;
      --muted: #9fb2c8;
      --line: #233247;
      --accent: #22d3ee;
      --running: #fb923c;
      --done: #34d399;
      --error: #f87171;
      --function: #60a5fa;
      --class: #a78bfa;
      --method: #22d3ee;
      --section: #fbbf24;
      --table: #34d399;
      --virtual: #f472b6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      display: flex;
      min-height: 100vh;
    }
    #sidebar {
      width: min(440px, 92vw);
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
      overflow-y: auto;
    }
    h1 { margin: 0 0 12px; font-size: 1.1rem; letter-spacing: 0.02em; }
    #connection-status.connected { color: #34d399; }
    #connection-status.disconnected {
      color: #f87171;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 12px; }
    #node-details pre {
      max-height: 220px;
      overflow: auto;
      background: #111b2b;
      border: 1px solid var(--line);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.8rem;
    }
    textarea, button {
      font-family: inherit;
      font-size: 0.9rem;
    }
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      margin: 6px 0;
      background: #111b2b;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      background: var(--accent);
      color: #03131d;
      margin-right: 6px;
    }
    #events {
      max-height: 180px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111b2b;
      padding: 8px;
      font-size: 0.82rem;
      white-space: pre-wrap;
    }
    #timeline-container {
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111b2b;
      padding: 8px;
      font-size: 0.78rem;
    }
    .timeline-event {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 4px 10px;
      padding: 6px 8px;
      border-left: 3px solid #9fb2c8;
      margin-bottom: 6px;
      background: #111b2b;
    }
    .timeline-event .timeline-type {
      font-weight: 700;
      color: var(--ink);
    }
    .timeline-event .timeline-meta {
      color: var(--muted);
    }
    .timeline-event.type-agent_start { border-color: #60a5fa; }
    .timeline-event.type-agent_complete { border-color: #34d399; }
    .timeline-event.type-agent_error { border-color: #f87171; }
    .timeline-event.type-agent_message { border-color: #fb923c; }
    .timeline-event.type-content_changed { border-color: #a78bfa; }
    #agent-panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #111b2b;
      padding: 10px;
      margin-top: 12px;
    }
    #agent-header {
      font-size: 0.86rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    #agent-stream {
      max-height: 320px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111b2b;
      padding: 8px;
      margin-bottom: 8px;
    }
    .panel-item {
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #111b2b;
    }
    .panel-user {
      border-left: 4px solid #22d3ee;
      background: #103041;
    }
    .panel-agent {
      border-left: 4px solid #60a5fa;
    }
    .panel-error {
      border-left: 4px solid #f87171;
      background: #3d1d27;
    }
    .panel-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .proposal-actions {
      margin-top: 8px;
    }
    .proposal-actions button {
      margin-bottom: 4px;
    }
    .diff-block {
      margin-top: 8px;
      max-height: 180px;
      overflow: auto;
      background: #111b2b;
      border-radius: 6px;
      padding: 8px;
      font-family: monospace;
      font-size: 0.74rem;
      white-space: pre-wrap;
    }
    #graph-container {
      position: relative;
      flex: 1;
      min-height: 100vh;
    }
    #graph {
      flex: 1;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #filter-bar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      max-width: 260px;
      padding: 6px 10px;
      background: rgba(16, 24, 38, 0.85);
      border: 1px solid var(--line);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      pointer-events: none;
    }
    .filter-group {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .filter-separator {
      width: 100%;
      height: 1px;
      background: var(--line);
      margin: 2px 0;
    }
    .filter-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      transition: opacity 0.15s, background 0.15s;
      opacity: 0.45;
      pointer-events: auto;
    }
    .filter-chip.active {
      opacity: 1;
      background: rgba(255, 255, 255, 0.06);
      color: var(--ink);
    }
    .chip-swatch {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    #zoom-controls {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
    }
    #zoom-controls button {
      width: 32px;
      height: 32px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(16, 24, 38, 0.85);
      color: var(--ink);
      cursor: pointer;
      backdrop-filter: blur(6px);
      pointer-events: auto;
    }
    #zoom-controls button:hover {
      background: rgba(34, 211, 238, 0.15);
    }
  </style>
</head>
<body>
  <div id="graph-container">
    <div id="filter-bar">
      <div class="filter-group">
        <button class="filter-chip active" data-filter-node="class">
          <span class="chip-swatch" style="background: var(--class);"></span>
          classes
        </button>
        <button class="filter-chip active" data-filter-node="function">
          <span class="chip-swatch" style="background: var(--function);"></span>
          functions
        </button>
        <button class="filter-chip active" data-filter-node="method">
          <span class="chip-swatch" style="background: var(--method);"></span>
          methods
        </button>
        <button class="filter-chip active" data-filter-node="section">
          <span class="chip-swatch" style="background: var(--section);"></span>
          sections
        </button>
        <button class="filter-chip active" data-filter-node="virtual">
          <span class="chip-swatch" style="background: var(--virtual);"></span>
          virtual
        </button>
      </div>
      <div class="filter-separator"></div>
      <div class="filter-group">
        <button class="filter-chip active" data-filter-edge="imports">
          <span class="chip-swatch" style="background: var(--function);"></span>
          imports
        </button>
        <button class="filter-chip active" data-filter-edge="inherits">
          <span class="chip-swatch" style="background: var(--class);"></span>
          inherits
        </button>
        <button class="filter-chip" data-filter-edge-emphasis="cross-file">
          <span class="chip-swatch" style="background: #7cc4ff;"></span>
          cross-file
        </button>
      </div>
      <div class="filter-separator"></div>
      <div class="filter-group">
        <button class="filter-chip active" data-filter-boxes="filesystem">
          <span class="chip-swatch" style="background: var(--muted);"></span>
          filesystem
        </button>
      </div>
    </div>
    <div id="graph"></div>
    <div id="zoom-controls">
      <button id="zoom-in" title="Zoom in">+</button>
      <button id="zoom-out" title="Zoom out">&minus;</button>
      <button id="zoom-reset" title="Fit to view">&#8862;</button>
    </div>
  </div>
  <aside id="sidebar">
    <h1>
      Remora
      <span id="connection-status" class="connected" title="SSE connection status">●</span>
    </h1>
    <div class="meta">Live agent graph</div>
    <section>
      <div id="companion-panel" style="
        display: none;
        padding: 12px;
        margin-bottom: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #111b2b;
      ">
        <div style="font-size: 11px; color: var(--muted); margin-bottom: 4px;">
          FOLLOWING CURSOR
        </div>
        <div id="companion-node-name" style="
          font-weight: bold;
          font-size: 16px;
          color: var(--accent);
          margin-bottom: 8px;
        "></div>
        <div id="companion-meta" style="
          font-size: 12px;
          color: var(--muted);
          margin-bottom: 8px;
        "></div>
        <div id="companion-source" style="
          font-family: monospace;
          font-size: 11px;
          background: #111b2b;
          padding: 8px;
          border-radius: 4px;
          max-height: 200px;
          overflow-y: auto;
          white-space: pre-wrap;
          color: #e5edf7;
        "></div>
      </div>
    </section>
    <section>
      <h2 id="node-name">Select a node</h2>
      <div id="node-details"></div>
    </section>
    <section id="agent-panel">
      <h3>Agent Panel</h3>
      <div id="agent-header">(select a node)</div>
      <div id="agent-stream"></div>
      <textarea id="chat-input" rows="3" placeholder="Send message to selected agent..."></textarea>
      <button id="send-chat">Send</button>
    </section>
    <section>
      <h3>Events</h3>
      <div id="events"></div>
    </section>
    <section>
      <h3>Timeline</h3>
      <div id="timeline-container"></div>
    </section>
  </aside>
  <script>
    const graph = new graphology.Graph();
    const nodeLabelHitboxes = new Map();
    const labelMeasureCanvas = document.createElement("canvas");
    const labelMeasureContext = labelMeasureCanvas.getContext("2d");
    const LAYOUT = Object.freeze({
      COL_PAD: 6.0,
      ROW_HEIGHT: 2.2,
      SUB_ROW_HEIGHT: 1.6,
      MIN_COL_WIDTH: 6.0,
      PX_PER_UNIT: 10,
      LABEL_PAD_PX: 24,
      BOX_PAD: 2.5,
      BOX_HEADER: 1.6,
      COL_WIDTH_BIAS: 2.0,
      DEPTH_Y_WEIGHT: 1.1,
      FILE_LINE_SPAN: 14.0,
      COL_Y_STAGGER: 1.2,
      WRAP_TARGET_WIDTH: 86.0,
      WRAP_TARGET_MIN_WIDTH: 56.0,
      WRAP_TARGET_MAX_WIDTH: 128.0,
      WRAP_FILL_RATIO: 0.88,
      ROW_BAND_GAP: 24.0,
      ROW_BASE_PAD: 6.0,
      MIN_COLUMN_SEPARATION: 2.6,
      MIN_NODE_GAP_Y: 1.8,
      COMPONENT_GAP_X: 10.0,
      COMPONENT_GAP_Y: 12.0,
      COMPONENT_PACK_MIN_WIDTH: 62.0,
      COMPONENT_PACK_MAX_WIDTH: 138.0,
      COMPONENT_PACK_FILL_RATIO: 0.95,
      SATELLITE_GAP_X: 3.8,
      SATELLITE_GAP_Y: 4.5,
      SATELLITE_ROW_GAP: 4.0,
      OCCUPANCY_TARGET_MIN: 0.35,
      OCCUPANCY_TARGET_MAX: 0.82,
      OCCUPANCY_SCALE_MIN: 0.88,
      OCCUPANCY_SCALE_MAX: 1.45,
      FIT_MIN_MEDIAN_LABEL_PX: 92,
      FIT_MARGIN_LEFT_UNITS: 7.0,
      FIT_MARGIN_RIGHT_UNITS: 2.8,
      FIT_MARGIN_TOP_UNITS: 5.5,
      FIT_MARGIN_BOTTOM_UNITS: 3.2,
      FIT_PADDING_PX: 56,
    });
    const LAYOUT_MODE = "v5_component";

    function drawRoundedRect(context, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      context.beginPath();
      context.moveTo(x + r, y);
      context.lineTo(x + width - r, y);
      context.quadraticCurveTo(x + width, y, x + width, y + r);
      context.lineTo(x + width, y + height - r);
      context.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      context.lineTo(x + r, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - r);
      context.lineTo(x, y + r);
      context.quadraticCurveTo(x, y, x + r, y);
      context.closePath();
    }

    function drawNodeBoxLabel(context, data) {
      if (!data.label || data.hidden) return;

      const nodeType = data.node_type || "";
      const text = String(data.label);

      const fontSize = 12;
      const fontWeight = "500";
      const padX = 10;
      const padY = 5;

      context.save();
      context.font = fontWeight + " " + fontSize + 'px "IBM Plex Mono", "IBM Plex Sans", sans-serif';
      const textWidth = context.measureText(text).width;
      const boxWidth = textWidth + padX * 2;
      const boxHeight = fontSize + padY * 2;
      const x = data.x - boxWidth / 2;
      const y = data.y - boxHeight / 2;

      let borderRadius = 8;
      if (nodeType === "function" || nodeType === "method") {
        borderRadius = boxHeight / 2;
      }

      const fillColors = {
        class:     "rgba(167, 139, 250, 0.10)",
        function:  "rgba(96, 165, 250, 0.10)",
        method:    "rgba(34, 211, 238, 0.10)",
        section:   "rgba(251, 191, 36, 0.10)",
        table:     "rgba(52, 211, 153, 0.10)",
        virtual:   "rgba(244, 114, 182, 0.10)",
      };
      const fillColor = fillColors[nodeType] || "rgba(10, 16, 24, 0.9)";

      drawRoundedRect(context, x, y, boxWidth, boxHeight, borderRadius);
      context.fillStyle = fillColor;
      context.fill();
      context.strokeStyle = data.color || "#22d3ee";
      context.lineWidth = 1.4;

      if (
        nodeType === "method" ||
        data.status === "awaiting_input" ||
        data.status === "awaiting_review"
      ) {
        context.setLineDash([4, 3]);
      }
      context.stroke();
      context.setLineDash([]);

      if (nodeType === "class") {
        const inset = 3;
        drawRoundedRect(
          context,
          x + inset,
          y + inset,
          boxWidth - inset * 2,
          boxHeight - inset * 2,
          Math.max(2, borderRadius - inset),
        );
        context.strokeStyle = data.color || "#a78bfa";
        context.lineWidth = 0.8;
        context.stroke();
      }

      context.fillStyle = data.dimmed ? "rgba(229, 237, 247, 0.15)" : "#e5edf7";
      context.textAlign = "center";
      context.textBaseline = "middle";
      context.fillText(text, data.x, data.y);

      if (data.node_id) {
        nodeLabelHitboxes.set(data.node_id, {
          x,
          y,
          width: boxWidth,
          height: boxHeight,
          area: boxWidth * boxHeight,
        });
      }

      context.restore();
    }

    const EDGE_STYLES = Object.freeze({
      imports:  { color: "#60a5fa", size: 2.2, type: "arrow" },
      inherits: { color: "#a78bfa", size: 2.0, type: "arrow" },
    });
    const DEFAULT_EDGE_STYLE = Object.freeze({
      color: "#3a4f6a", size: 1, type: "line",
    });

    const sigmaApi = globalThis.sigma || {};
    const sigmaCtorApi = globalThis.Sigma || {};
    const sigmaRendering = sigmaApi.rendering || sigmaCtorApi.rendering || Sigma.rendering || {};
    const edgeCurveProgram =
      sigmaApi.EdgeCurveProgram ||
      sigmaApi.programs?.EdgeCurveProgram ||
      sigmaCtorApi.EdgeCurveProgram ||
      sigmaCtorApi.programs?.EdgeCurveProgram ||
      sigmaRendering.EdgeCurveProgram;

    let selectedNode = null;
    const renderer = new Sigma(graph, document.getElementById("graph"), {
      labelRenderedSizeThreshold: 0,
      defaultDrawNodeLabel: drawNodeBoxLabel,
      defaultEdgeType: "arrow",
      edgeProgramClasses: edgeCurveProgram ? { curve: edgeCurveProgram } : undefined,
      stagePadding: LAYOUT.FIT_PADDING_PX,
      minCameraRatio: 0.35,
      maxCameraRatio: 3.2,
      zIndex: true,
      nodeReducer: (node, data) => {
        const result = { ...data };
        if (data.dimmed) {
          result.color = "rgba(100, 116, 139, 0.2)";
          result.label = data.label;
          result.forceLabel = true;
        }
        if (node === selectedNode) {
          result.size = (data.size || 2.4) * 1.3;
          result.zIndex = 10;
        }
        return result;
      },
      edgeReducer: (edge, data) => {
        const style = EDGE_STYLES[data.label] || DEFAULT_EDGE_STYLE;
        const crossFileColor = data.label === "imports" && data.is_cross_file ? "#7cc4ff" : style.color;
        const visualType =
          data.visual_type ||
          (data.label === "imports" && data.is_cross_file && edgeCurveProgram ? "curve" : style.type);
        return {
          ...data,
          color: crossFileColor,
          size: style.size + (data.is_cross_file ? 0.6 : 0),
          type: visualType,
        };
      },
    });
    const timelineEvents = [];
    const MAX_TIMELINE_EVENTS = 200;
    const agentEventCache = new Map();
    const CACHE_LIMIT = 200;

    const filterState = {
      hiddenNodeTypes: new Set(),
      hiddenEdgeTypes: new Set(),
      edgeEmphasisCrossFileOnly: false,
      showBoundingBoxes: true,
    };

    function applyFilters() {
      graph.forEachNode((id, attrs) => {
        const shouldHide = filterState.hiddenNodeTypes.has(attrs.node_type);
        graph.setNodeAttribute(id, "hidden", shouldHide);
      });
      graph.forEachEdge((edge, attrs) => {
        const hiddenByType = filterState.hiddenEdgeTypes.has(attrs.label);
        const hiddenByEmphasis = filterState.edgeEmphasisCrossFileOnly && !attrs.is_cross_file;
        graph.setEdgeAttribute(edge, "hidden", hiddenByType || hiddenByEmphasis);
      });
      renderer.refresh();
    }

    const colorByType = {
      function: getComputedStyle(document.documentElement).getPropertyValue("--function").trim(),
      class:    getComputedStyle(document.documentElement).getPropertyValue("--class").trim(),
      method:   getComputedStyle(document.documentElement).getPropertyValue("--method").trim(),
      section:  getComputedStyle(document.documentElement).getPropertyValue("--section").trim(),
      table:    getComputedStyle(document.documentElement).getPropertyValue("--table").trim(),
      virtual:  getComputedStyle(document.documentElement).getPropertyValue("--virtual").trim(),
    };

    function qualifyLabels(nodes, nodeById) {
      const nameCount = {};
      for (const n of nodes) {
        nameCount[n.name] = (nameCount[n.name] || 0) + 1;
      }
      for (const n of nodes) {
        if (nameCount[n.name] <= 1) {
          n._displayLabel = n.name;
          continue;
        }
        const parent = n.parent_id ? nodeById[n.parent_id] : null;
        if (parent && parent.name !== n.name) {
          n._displayLabel = parent.name + "/" + n.name;
          continue;
        }
        const parts = (n.file_path || "").replace(/\\/g, "/").split("/").filter(Boolean);
        let qualifier = null;
        for (let i = parts.length - 2; i >= 0; i--) {
          if (parts[i] !== n.name) {
            qualifier = parts[i];
            break;
          }
        }
        n._displayLabel = qualifier ? qualifier + "/" + n.name : n.name;
      }
    }

    function measureLabelWidth(text) {
      labelMeasureContext.font = '500 12px "IBM Plex Mono", "IBM Plex Sans", sans-serif';
      return labelMeasureContext.measureText(String(text)).width + LAYOUT.LABEL_PAD_PX;
    }

    function computeNodeDepths(nodes, nodeById) {
      const depthOf = {};
      const visiting = new Set();
      function computeDepth(nodeId) {
        if (depthOf[nodeId] !== undefined) return depthOf[nodeId];
        if (visiting.has(nodeId)) return 0;
        visiting.add(nodeId);
        const node = nodeById[nodeId];
        if (!node || !node.parent_id || !nodeById[node.parent_id]) {
          depthOf[nodeId] = 0;
        } else {
          depthOf[nodeId] = computeDepth(node.parent_id) + 1;
        }
        visiting.delete(nodeId);
        return depthOf[nodeId];
      }
      for (const n of nodes) computeDepth(n.node_id);
      return depthOf;
    }

    function computeConnectedComponents(nodes, edges) {
      const nodeIds = nodes
        .filter((node) => node.node_type !== "directory")
        .map((node) => node.node_id)
        .sort();
      const adjacency = new Map(nodeIds.map((nodeId) => [nodeId, new Set()]));

      for (const edge of edges || []) {
        if (edge.edge_type === "contains") continue;
        if (!adjacency.has(edge.from_id) || !adjacency.has(edge.to_id)) continue;
        adjacency.get(edge.from_id).add(edge.to_id);
        adjacency.get(edge.to_id).add(edge.from_id);
      }

      const seen = new Set();
      const components = [];
      for (const nodeId of nodeIds) {
        if (seen.has(nodeId)) continue;
        const stack = [nodeId];
        const componentIds = [];
        seen.add(nodeId);
        while (stack.length > 0) {
          const current = stack.pop();
          componentIds.push(current);
          const neighbors = adjacency.get(current) || new Set();
          for (const neighbor of neighbors) {
            if (!seen.has(neighbor)) {
              seen.add(neighbor);
              stack.push(neighbor);
            }
          }
        }
        componentIds.sort();
        components.push(componentIds);
      }

      components.sort((a, b) => (b.length - a.length) || a[0].localeCompare(b[0]));
      return { components, adjacency };
    }

    function computePositionBounds(positions, nodeById) {
      let minX = Number.POSITIVE_INFINITY;
      let maxX = Number.NEGATIVE_INFINITY;
      let minY = Number.POSITIVE_INFINITY;
      let maxY = Number.NEGATIVE_INFINITY;

      for (const [nodeId, pos] of positions) {
        const label = nodeById[nodeId]?._displayLabel || nodeById[nodeId]?.name || nodeId;
        const labelWidth = measureLabelWidth(label) / LAYOUT.PX_PER_UNIT;
        const halfW = Math.max(2.6, labelWidth / 2);
        const halfH = 1.25;
        minX = Math.min(minX, pos.x - halfW);
        maxX = Math.max(maxX, pos.x + halfW);
        minY = Math.min(minY, pos.y - halfH);
        maxY = Math.max(maxY, pos.y + halfH);
      }

      if (!Number.isFinite(minX) || !Number.isFinite(maxX) || !Number.isFinite(minY) || !Number.isFinite(maxY)) {
        return {
          minX: 0,
          maxX: 0,
          minY: 0,
          maxY: 0,
          width: 0,
          height: 0,
          centerX: 0,
          centerY: 0,
        };
      }

      return {
        minX,
        maxX,
        minY,
        maxY,
        width: Math.max(1, maxX - minX),
        height: Math.max(1, maxY - minY),
        centerX: (minX + maxX) / 2,
        centerY: (minY + maxY) / 2,
      };
    }

    function normalizeLayoutOccupancy(positions, nodeById) {
      if (!positions || positions.size === 0) return;
      const graphEl = document.getElementById("graph");
      const graphWidthPx = graphEl?.clientWidth || 1200;
      const graphHeightPx = graphEl?.clientHeight || 900;
      const viewportAreaUnits =
        Math.max(1, graphWidthPx / LAYOUT.PX_PER_UNIT) *
        Math.max(1, graphHeightPx / LAYOUT.PX_PER_UNIT);
      const bounds = computePositionBounds(positions, nodeById);
      const layoutAreaUnits = Math.max(1, bounds.width * bounds.height);
      const occupancy = layoutAreaUnits / viewportAreaUnits;

      let targetScale = 1;
      if (occupancy < LAYOUT.OCCUPANCY_TARGET_MIN) {
        targetScale = Math.sqrt(LAYOUT.OCCUPANCY_TARGET_MIN / Math.max(occupancy, 1e-6));
      } else if (occupancy > LAYOUT.OCCUPANCY_TARGET_MAX) {
        targetScale = Math.sqrt(LAYOUT.OCCUPANCY_TARGET_MAX / occupancy);
      }
      const scale = Math.max(
        LAYOUT.OCCUPANCY_SCALE_MIN,
        Math.min(LAYOUT.OCCUPANCY_SCALE_MAX, targetScale),
      );
      if (Math.abs(scale - 1) < 0.03) return;

      for (const [, pos] of positions) {
        pos.x = bounds.centerX + (pos.x - bounds.centerX) * scale;
        pos.y = bounds.centerY + (pos.y - bounds.centerY) * scale;
      }
    }

    function nodePathRoot(node) {
      const parts = (node?.file_path || "")
        .replace(/\\/g, "/")
        .split("/")
        .filter(Boolean);
      return parts[0] || "__root__";
    }

    function layoutNodesV4FileWrap(nodes, nodeById, depthOf = computeNodeDepths(nodes, nodeById)) {

      const directories = [];
      const fileGroups = {};
      for (const n of nodes) {
        if (n.node_type === "directory") {
          directories.push(n);
          continue;
        }
        const fp = n.file_path || "__unfiled__";
        (fileGroups[fp] ||= []).push(n);
      }

      const sortedFiles = Object.keys(fileGroups).sort();
      const graphWidthPx = document.getElementById("graph")?.clientWidth || 1200;
      const inferredRowWidth =
        (graphWidthPx / LAYOUT.PX_PER_UNIT) * LAYOUT.WRAP_FILL_RATIO;
      const targetRowWidth = Math.max(
        LAYOUT.WRAP_TARGET_MIN_WIDTH,
        Math.min(
          LAYOUT.WRAP_TARGET_MAX_WIDTH,
          Math.max(LAYOUT.WRAP_TARGET_WIDTH, inferredRowWidth),
        ),
      );

      const fileColumns = sortedFiles.map((fp, fileIndex) => {
        const group = fileGroups[fp];
        group.sort((a, b) =>
          (depthOf[a.node_id] - depthOf[b.node_id]) ||
          (a.start_line - b.start_line) ||
          a.name.localeCompare(b.name)
        );

        let maxPx = 0;
        for (const n of group) {
          const px = measureLabelWidth(n._displayLabel || n.name);
          if (px > maxPx) maxPx = px;
        }
        const width = Math.max(
          LAYOUT.MIN_COL_WIDTH,
          maxPx / LAYOUT.PX_PER_UNIT + LAYOUT.COL_WIDTH_BIAS,
        );

        const parsedLines = group.map((n, idx) => {
          const raw = Number(n.start_line);
          return Number.isFinite(raw) && raw > 0 ? raw : idx + 1;
        });
        const minLine = Math.min(...parsedLines);
        const maxLine = Math.max(...parsedLines);
        const range = Math.max(1, maxLine - minLine);
        const sameLineCounts = new Map();
        const localOffsets = new Map();
        let maxLocalOffset = 0;

        for (let slotIndex = 0; slotIndex < group.length; slotIndex++) {
          const n = group[slotIndex];
          const startLine = parsedLines[slotIndex];
          const lineNorm =
            range > 0
              ? (startLine - minLine) / range
              : (group.length > 1 ? slotIndex / (group.length - 1) : 0);
          const lineKey = Math.round(lineNorm * 1000);
          const sameLineIndex = sameLineCounts.get(lineKey) || 0;
          sameLineCounts.set(lineKey, sameLineIndex + 1);

          const depthOffset = depthOf[n.node_id] * LAYOUT.DEPTH_Y_WEIGHT;
          const lineOffset = lineNorm * LAYOUT.FILE_LINE_SPAN;
          const duplicateOffset = sameLineIndex * LAYOUT.SUB_ROW_HEIGHT;
          const slotOffset = slotIndex * LAYOUT.MIN_NODE_GAP_Y;
          const colStagger = (fileIndex % 4) * LAYOUT.COL_Y_STAGGER;
          const localOffset = depthOffset + lineOffset + duplicateOffset + slotOffset + colStagger;
          localOffsets.set(n.node_id, localOffset);
          if (localOffset > maxLocalOffset) maxLocalOffset = localOffset;
        }

        return {
          filePath: fp,
          nodes: group,
          width,
          height: maxLocalOffset + LAYOUT.ROW_BASE_PAD,
          localOffsets,
          rowIndex: -1,
          x: 0,
        };
      });

      const rows = [];
      let activeRow = { columns: [], width: 0, height: 0 };
      for (const column of fileColumns) {
        const projectedWidth =
          activeRow.columns.length === 0
            ? column.width
            : activeRow.width + LAYOUT.COL_PAD + column.width;
        if (activeRow.columns.length > 0 && projectedWidth > targetRowWidth) {
          rows.push(activeRow);
          activeRow = { columns: [], width: 0, height: 0 };
        }
        if (activeRow.columns.length > 0) {
          activeRow.width += LAYOUT.COL_PAD;
        }
        activeRow.columns.push(column);
        activeRow.width += column.width;
        activeRow.height = Math.max(activeRow.height, column.height);
      }
      if (activeRow.columns.length > 0) rows.push(activeRow);

      const positions = new Map();
      let rowOffset = 0;
      for (let rowIndex = 0; rowIndex < rows.length; rowIndex++) {
        const row = rows[rowIndex];
        const rowBaseY = -rowOffset;
        let xCursor = -(row.width / 2);
        for (const column of row.columns) {
          xCursor += column.width / 2;
          column.x = xCursor;
          column.rowIndex = rowIndex;
          for (const node of column.nodes) {
            const localOffset = column.localOffsets.get(node.node_id) || 0;
            positions.set(node.node_id, { x: column.x, y: rowBaseY - localOffset });
          }
          xCursor += column.width / 2 + LAYOUT.COL_PAD;
        }
        rowOffset += row.height + LAYOUT.ROW_BAND_GAP;
      }

      for (const row of rows) {
        let previousRight = Number.NEGATIVE_INFINITY;
        for (const column of row.columns) {
          const left = column.x - column.width / 2;
          const minLeft =
            previousRight === Number.NEGATIVE_INFINITY
              ? left
              : previousRight + LAYOUT.MIN_COLUMN_SEPARATION;
          if (left < minLeft) {
            const delta = minLeft - left;
            column.x += delta;
            for (const node of column.nodes) {
              const pos = positions.get(node.node_id);
              if (pos) pos.x += delta;
            }
          }
          previousRight = column.x + column.width / 2;
        }
      }

      const boxes = computeBoundingBoxes(directories, positions, nodeById, depthOf);
      return { positions, boxes, directories };
    }

    function layoutNodesV5Component(nodes, nodeById, edges) {
      const depthOf = computeNodeDepths(nodes, nodeById);
      const directories = nodes.filter((node) => node.node_type === "directory");
      const contentNodes = nodes.filter((node) => node.node_type !== "directory");

      const { components } = computeConnectedComponents(contentNodes, edges || []);
      if (components.length === 0) {
        return { positions: new Map(), boxes: new Map(), directories };
      }

      const componentLayouts = components.map((ids) => {
        const componentNodes = ids.map((id) => nodeById[id]).filter(Boolean);
        const localLayout = layoutNodesV4FileWrap(componentNodes, nodeById, depthOf);
        const bounds = computePositionBounds(localLayout.positions, nodeById);
        return {
          ids,
          positions: localLayout.positions,
          bounds,
          fileRoots: new Set(componentNodes.map((node) => nodePathRoot(node))),
          satelliteCount: 0,
        };
      });

      const mainComponents = componentLayouts.filter((item) => item.ids.length > 1);
      const primaryComponents = mainComponents.length > 0 ? mainComponents : componentLayouts;
      const trailingSingletons = mainComponents.length > 0
        ? componentLayouts.filter((item) => item.ids.length === 1)
        : [];

      const graphWidthPx = document.getElementById("graph")?.clientWidth || 1200;
      const inferredPackWidth =
        (graphWidthPx / LAYOUT.PX_PER_UNIT) * LAYOUT.COMPONENT_PACK_FILL_RATIO;
      const targetPackWidth = Math.max(
        LAYOUT.COMPONENT_PACK_MIN_WIDTH,
        Math.min(LAYOUT.COMPONENT_PACK_MAX_WIDTH, inferredPackWidth),
      );

      const placements = [];
      let xCursor = 0;
      let rowTop = 0;
      let rowHeight = 0;

      for (const component of primaryComponents) {
        const width = component.bounds.width;
        const height = component.bounds.height;
        const projectedWidth =
          xCursor === 0 ? width : xCursor + LAYOUT.COMPONENT_GAP_X + width;
        if (xCursor > 0 && projectedWidth > targetPackWidth) {
          xCursor = 0;
          rowTop -= rowHeight + LAYOUT.COMPONENT_GAP_Y;
          rowHeight = 0;
        }
        if (xCursor > 0) xCursor += LAYOUT.COMPONENT_GAP_X;

        const tx = xCursor - component.bounds.minX;
        const ty = rowTop - component.bounds.maxY;

        placements.push({
          component,
          tx,
          ty,
          minY: component.bounds.minY + ty,
          maxY: component.bounds.maxY + ty,
          width,
          centerX: component.bounds.centerX + tx,
          fileRoots: component.fileRoots,
          satelliteCount: 0,
        });

        xCursor += width;
        rowHeight = Math.max(rowHeight, height);
      }

      const positions = new Map();
      const applyPlacement = (placement) => {
        for (const [nodeId, pos] of placement.component.positions) {
          positions.set(nodeId, { x: pos.x + placement.tx, y: pos.y + placement.ty });
        }
      };
      for (const placement of placements) {
        applyPlacement(placement);
      }

      for (const singleton of trailingSingletons) {
        if (placements.length === 0) break;
        const singletonNode = nodeById[singleton.ids[0]];
        const singletonRoot = nodePathRoot(singletonNode);

        let anchor = placements[0];
        const rootMatch = placements.find((placement) => placement.fileRoots.has(singletonRoot));
        if (rootMatch) anchor = rootMatch;

        const satelliteIndex = anchor.satelliteCount || 0;
        anchor.satelliteCount = satelliteIndex + 1;
        const side = satelliteIndex % 2 === 0 ? -1 : 1;
        const row = Math.floor(satelliteIndex / 2);
        const centerX =
          anchor.centerX +
          side * (anchor.width / 2 + singleton.bounds.width / 2 + LAYOUT.SATELLITE_GAP_X);
        const topY =
          anchor.minY -
          LAYOUT.SATELLITE_GAP_Y -
          row * (singleton.bounds.height + LAYOUT.SATELLITE_ROW_GAP);

        applyPlacement({
          component: singleton,
          tx: centerX - singleton.bounds.centerX,
          ty: topY - singleton.bounds.maxY,
        });
      }

      normalizeLayoutOccupancy(positions, nodeById);
      const boxes = computeBoundingBoxes(directories, positions, nodeById, depthOf);
      return { positions, boxes, directories };
    }

    function layoutNodes(nodes, nodeById, edges) {
      if (LAYOUT_MODE === "v4_file_wrap") {
        return layoutNodesV4FileWrap(nodes, nodeById);
      }
      return layoutNodesV5Component(nodes, nodeById, edges);
    }

    function isDescendantOf(nodeId, ancestorId, nodeById) {
      let current = nodeById[nodeId];
      let steps = 0;
      while (current && steps < 50) {
        if (current.parent_id === ancestorId) return true;
        current = current.parent_id ? nodeById[current.parent_id] : null;
        steps++;
      }
      return false;
    }

    function computeBoundingBoxes(directories, positions, nodeById, depthOf) {
      const sorted = [...directories].sort((a, b) =>
        (depthOf[b.node_id] - depthOf[a.node_id]) || a.name.localeCompare(b.name)
      );

      const boxes = new Map();
      for (const dir of sorted) {
        const xs = [];
        const ys = [];

        for (const [nid, pos] of positions) {
          if (isDescendantOf(nid, dir.node_id, nodeById)) {
            xs.push(pos.x);
            ys.push(pos.y);
          }
        }

        for (const [did, box] of boxes) {
          if (nodeById[did]?.parent_id === dir.node_id) {
            xs.push(box.x);
            xs.push(box.x + box.w);
            ys.push(box.y);
            ys.push(box.y - box.h);
          }
        }

        if (xs.length === 0) continue;

        const minX = Math.min(...xs);
        const maxX = Math.max(...xs);
        const maxY = Math.max(...ys);
        const minY = Math.min(...ys);

        boxes.set(dir.node_id, {
          x: minX - LAYOUT.BOX_PAD,
          y: maxY + LAYOUT.BOX_PAD + LAYOUT.BOX_HEADER,
          w: (maxX - minX) + LAYOUT.BOX_PAD * 2,
          h: (maxY - minY) + LAYOUT.BOX_PAD * 2 + LAYOUT.BOX_HEADER,
          label: dir.name,
          depth: depthOf[dir.node_id],
        });
      }

      return boxes;
    }

    function nodeColor(nodeType, status) {
      if (status === "running") return "#fb923c";
      if (status === "awaiting_input" || status === "awaiting_review") return "#fbbf24";
      if (status === "error") return "#f87171";
      return colorByType[nodeType] || "#818cf8";
    }

    let boundingBoxes = new Map();

    function computeFitBBox() {
      let minX = Number.POSITIVE_INFINITY;
      let maxX = Number.NEGATIVE_INFINITY;
      let minY = Number.POSITIVE_INFINITY;
      let maxY = Number.NEGATIVE_INFINITY;
      const visibleLabelWidthsPx = [];

      graph.forEachNode((nodeId, attrs) => {
        if (attrs.hidden) return;
        const labelWidthPx = measureLabelWidth(attrs.label || attrs.node_id || nodeId);
        const labelWidth = labelWidthPx / LAYOUT.PX_PER_UNIT;
        visibleLabelWidthsPx.push(labelWidthPx);
        const halfW = Math.max(2.6, labelWidth / 2);
        const halfH = 1.25;
        minX = Math.min(minX, attrs.x - halfW);
        maxX = Math.max(maxX, attrs.x + halfW);
        minY = Math.min(minY, attrs.y - halfH);
        maxY = Math.max(maxY, attrs.y + halfH);
      });

      if (filterState.showBoundingBoxes) {
        for (const [, box] of boundingBoxes) {
          minX = Math.min(minX, box.x);
          maxX = Math.max(maxX, box.x + box.w);
          minY = Math.min(minY, box.y - box.h);
          maxY = Math.max(maxY, box.y);
        }
      }

      if (!Number.isFinite(minX) || !Number.isFinite(maxX) || !Number.isFinite(minY) || !Number.isFinite(maxY)) {
        return null;
      }

      minX -= LAYOUT.FIT_MARGIN_LEFT_UNITS;
      maxX += LAYOUT.FIT_MARGIN_RIGHT_UNITS;
      minY -= LAYOUT.FIT_MARGIN_BOTTOM_UNITS;
      maxY += LAYOUT.FIT_MARGIN_TOP_UNITS;

      const graphEl = document.getElementById("graph");
      const graphWidthPx = graphEl?.clientWidth || 1200;
      if (visibleLabelWidthsPx.length > 0 && graphWidthPx > 0) {
        const sortedWidths = [...visibleLabelWidthsPx].sort((a, b) => a - b);
        const mid = Math.floor(sortedWidths.length / 2);
        const medianLabelPx =
          sortedWidths.length % 2 === 0
            ? (sortedWidths[mid - 1] + sortedWidths[mid]) / 2
            : sortedWidths[mid];
        const maxReadableWidthUnits =
          (graphWidthPx / LAYOUT.FIT_MIN_MEDIAN_LABEL_PX) *
          (medianLabelPx / LAYOUT.PX_PER_UNIT);
        const fitWidthUnits = maxX - minX;
        if (fitWidthUnits > maxReadableWidthUnits && maxReadableWidthUnits > 0) {
          const cx = (minX + maxX) / 2;
          const half = maxReadableWidthUnits / 2;
          minX = cx - half;
          maxX = cx + half;
        }
      }

      return { x: [minX, maxX], y: [minY, maxY] };
    }

    function applyCustomFit(duration = 200) {
      const camera = renderer.getCamera();
      const bbox = computeFitBBox();
      renderer.setCustomBBox(bbox || null);
      const resetDuration = Math.max(0, duration);
      camera.animatedReset({ duration: resetDuration });
      if (resetDuration === 0) renderer.refresh();
    }

    async function loadGraph() {
      const nodesResp = await fetch("/api/nodes");
      const nodes = await nodesResp.json();
      const edgeResp = await fetch("/api/edges");
      const edges = await edgeResp.json();
      const nodeById = Object.fromEntries(nodes.map((n) => [n.node_id, n]));

      qualifyLabels(nodes, nodeById);
      const layout = layoutNodes(nodes, nodeById, edges);

      const allPositions = [...layout.positions.values()];
      if (allPositions.length > 0) {
        let sumX = 0;
        let sumY = 0;
        for (const pos of allPositions) {
          sumX += pos.x;
          sumY += pos.y;
        }
        const cx = sumX / allPositions.length;
        const cy = sumY / allPositions.length;

        for (const [, pos] of layout.positions) {
          pos.x -= cx;
          pos.y -= cy;
        }
        for (const [, box] of layout.boxes) {
          box.x -= cx;
          box.y -= cy;
        }
      }

      boundingBoxes = layout.boxes;
      graph.clear();

      for (const node of nodes) {
        if (node.node_type === "directory") continue;
        const pos = layout.positions.get(node.node_id);
        if (!pos) continue;
        graph.addNode(node.node_id, {
          node_id: node.node_id,
          label: node._displayLabel || node.name,
          forceLabel: true,
          size: 2.4,
          x: pos.x,
          y: pos.y,
          color: nodeColor(node.node_type, node.status),
          node_type: node.node_type,
          file_path: node.file_path || "",
          status: node.status,
        });
      }

      for (const edge of edges) {
        if (edge.edge_type === "contains") continue;
        const key = edge.from_id + "->" + edge.to_id + ":" + edge.edge_type;
        if (!graph.hasNode(edge.from_id) || !graph.hasNode(edge.to_id)) continue;
        if (!graph.hasEdge(key)) {
          const sourcePath = graph.getNodeAttribute(edge.from_id, "file_path") || "";
          const targetPath = graph.getNodeAttribute(edge.to_id, "file_path") || "";
          const isCrossFile = !!sourcePath && !!targetPath && sourcePath !== targetPath;
          graph.addEdgeWithKey(key, edge.from_id, edge.to_id, {
            label: edge.edge_type,
            size: 1,
            source_file_path: sourcePath,
            target_file_path: targetPath,
            is_cross_file: isCrossFile,
            visual_type:
              edge.edge_type === "imports" && isCrossFile && edgeCurveProgram ? "curve" : "arrow",
          });
        }
      }

      applyFilters();
      renderer.refresh();
      applyCustomFit(120);
    }

    function appendEventLine(text) {
      const box = document.getElementById("events");
      box.textContent = `${text}\n${box.textContent}`.slice(0, 4000);
    }

    function cacheEvent(eventType, payload) {
      const agentId = payload?.agent_id || payload?.from_agent || payload?.to_agent;
      if (!agentId) return;
      if (!agentEventCache.has(agentId)) {
        agentEventCache.set(agentId, []);
      }
      const cache = agentEventCache.get(agentId);
      cache.push({ eventType, payload, timestamp: Date.now() });
      if (cache.length > CACHE_LIMIT) cache.shift();
    }

    function renderSimpleDiff(oldSource, newSource) {
      const oldLines = String(oldSource || "").split("\n");
      const newLines = String(newSource || "").split("\n");
      const maxLen = Math.max(oldLines.length, newLines.length);
      const out = [];
      for (let i = 0; i < maxLen; i++) {
        const oldLine = oldLines[i] ?? "";
        const newLine = newLines[i] ?? "";
        if (oldLine === newLine) {
          out.push(`  ${oldLine}`);
        } else {
          if (oldLine) out.push(`- ${oldLine}`);
          if (newLine) out.push(`+ ${newLine}`);
        }
      }
      return out.join("\n");
    }

function addTimelineEvent(eventType, payload) {
    const timestamp = Number(payload?.timestamp) || (Date.now() / 1000);
    const agent = payload?.agent_id || payload?.from_agent || payload?.to_agent || "?";
    const summary = payload?.digest_summary || payload?.summary || payload?.content || payload?.node_id || "";
      timelineEvents.push({
        eventType: eventType || "Event",
        timestamp,
        agent,
        summary: String(summary).slice(0, 240),
      });
      if (timelineEvents.length > MAX_TIMELINE_EVENTS) {
        timelineEvents.shift();
      }
      renderTimeline();
    }

    function renderTimeline() {
      const container = document.getElementById("timeline-container");
      if (!container) return;
      container.innerHTML = timelineEvents
        .slice()
        .reverse()
        .map((entry) => {
          const time = new Date(entry.timestamp * 1000).toLocaleTimeString();
          return (
            `<div class=\"timeline-event type-${escapeHtml(entry.eventType)}\">` +
            `<div class=\"timeline-meta\">${escapeHtml(time)}</div>` +
            `<div class=\"timeline-type\">${escapeHtml(entry.eventType)}</div>` +
            `<div class=\"timeline-meta\">${escapeHtml(entry.agent)}</div>` +
            `<div>${escapeHtml(entry.summary)}</div>` +
            `</div>`
          );
        })
        .join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('\"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function renderAgentPanel(nodeId) {
      const header = document.getElementById("agent-header");
      const stream = document.getElementById("agent-stream");
      if (!nodeId) {
        header.textContent = "(select a node)";
        stream.innerHTML = "";
        return;
      }

      try {
        const response = await fetch(`/api/nodes/${encodeURIComponent(nodeId)}`);
        if (response.ok) {
          const node = await response.json();
          header.textContent = `${node.full_name} · ${node.node_type} · ${node.status}`;
        }
      } catch {
        header.textContent = `${nodeId} · unavailable`;
      }

      const events = agentEventCache.get(nodeId) || [];
      if (events.length === 0) {
        stream.innerHTML = "<div class=\"panel-item\">No events yet for this agent.</div>";
        return;
      }

      const items = events.slice(-60).map((entry) => {
        const eventType = entry.eventType;
        const payload = entry.payload || {};
        if (eventType === "agent_message" && payload.from_agent === "user") {
          return `<div class=\"panel-item panel-user\"><div class=\"panel-meta\">User</div>${escapeHtml(payload.content || "")}</div>`;
        }
        if (eventType === "agent_complete") {
          return `<div class=\"panel-item panel-agent\"><div class=\"panel-meta\">Agent Response</div>${escapeHtml(payload.full_response || payload.result_summary || "")}</div>`;
        }
        if (eventType === "agent_start") {
          return `<div class=\"panel-item\"><div class=\"panel-meta\">Agent Start</div>Turn started.</div>`;
        }
        if (eventType === "agent_error") {
          return `<div class=\"panel-item panel-error\"><div class=\"panel-meta\">Agent Error</div>${escapeHtml(payload.error || "")}</div>`;
        }
        if (eventType === "tool_result") {
          return `<div class=\"panel-item\"><div class=\"panel-meta\">Tool Result · ${escapeHtml(payload.tool_name || "")}</div>${escapeHtml(payload.result_summary || "")}</div>`;
        }
        if (eventType === "human_input_request") {
          const options = Array.isArray(payload.options) ? payload.options.join(", ") : "";
          return (
            `<div class=\"panel-item\" data-request-id=\"${escapeHtml(payload.request_id || "")}\">` +
            `<div class=\"panel-meta\">Human Input Needed</div>` +
            `<div>${escapeHtml(payload.question || "")}</div>` +
            (options ? `<div class=\"panel-meta\">Options: ${escapeHtml(options)}</div>` : "") +
            `<textarea data-request-input=\"${escapeHtml(payload.request_id || "")}\" rows=\"2\" placeholder=\"Type response...\"></textarea>` +
            `<button data-request-submit=\"${escapeHtml(payload.request_id || "")}\">Submit Response</button>` +
            `</div>`
          );
        }
        if (eventType === "rewrite_proposal") {
          return (
            `<div class=\"panel-item\" data-proposal-node=\"${escapeHtml(nodeId)}\">` +
            `<div class=\"panel-meta\">Rewrite Proposal</div>` +
            `<div>${escapeHtml(payload.reason || "Proposal ready for review.")}</div>` +
            `<div class=\"proposal-actions\">` +
            `<button data-proposal-diff=\"${escapeHtml(nodeId)}\">View Diff</button>` +
            `<button data-proposal-accept=\"${escapeHtml(nodeId)}\">Accept</button>` +
            `<button data-proposal-reject=\"${escapeHtml(nodeId)}\">Reject</button>` +
            `</div>` +
            `<div class=\"diff-block\" data-proposal-diff-output=\"${escapeHtml(nodeId)}\" style=\"display:none\"></div>` +
            `</div>`
          );
        }
        return `<div class=\"panel-item\"><div class=\"panel-meta\">${escapeHtml(eventType)}</div>${escapeHtml(JSON.stringify(payload))}</div>`;
      });

      stream.innerHTML = items.join("");
      stream.scrollTop = stream.scrollHeight;
    }

    async function showNode(nodeId) {
      const response = await fetch(`/api/nodes/${encodeURIComponent(nodeId)}`);
      if (!response.ok) return;
      const node = await response.json();
      document.getElementById("node-name").textContent = node.full_name;
      const details = document.getElementById("node-details");
      details.innerHTML = "";

      const typeDiv = document.createElement("div");
      typeDiv.textContent = `Type: ${node.node_type}`;
      details.appendChild(typeDiv);

      const statusDiv = document.createElement("div");
      statusDiv.textContent = `Status: ${node.status}`;
      details.appendChild(statusDiv);

      const fileDiv = document.createElement("div");
      fileDiv.textContent = `File: ${node.file_path}:${node.start_line}-${node.end_line}`;
      details.appendChild(fileDiv);

      const pre = document.createElement("pre");
      pre.textContent = node.text;
      details.appendChild(pre);
      selectedNode = node.node_id;
    }

    function selectNode(nodeId) {
      selectedNode = nodeId;
      showNode(nodeId);
      renderAgentPanel(nodeId);
    }

    function hitTestLabeledNode(event) {
      const pixelRatio = renderer.getRenderParams().pixelRatio || 1;
      const viewportX = event.x;
      const viewportY = event.y;
      const clickCandidates = [
        { x: viewportX, y: viewportY },
        { x: event.x * pixelRatio, y: event.y * pixelRatio },
        { x: viewportX / pixelRatio, y: viewportY / pixelRatio },
      ];

      let winner = null;
      let minArea = Number.POSITIVE_INFINITY;
      for (const clickPoint of clickCandidates) {
        for (const [nodeId, box] of nodeLabelHitboxes.entries()) {
          if (
            clickPoint.x >= box.x &&
            clickPoint.x <= box.x + box.width &&
            clickPoint.y >= box.y &&
            clickPoint.y <= box.y + box.height &&
            box.area < minArea
          ) {
            winner = nodeId;
            minArea = box.area;
          }
        }
      }
      if (winner && graph.hasNode(winner)) {
        const nodeType = graph.getNodeAttribute(winner, "node_type");
        if (nodeType !== "__label__") return winner;
      }

      // Fallback path: derive viewport positions from Sigma display data directly.
      const dims = renderer.getDimensions();
      graph.forEachNode((nodeId) => {
        const data = renderer.getNodeDisplayData(nodeId);
        if (!data?.label || data.hidden || data.node_type === "__label__") return;
        const points = [
          { x: data.x, y: data.y },
          renderer.graphToViewport({ x: data.x, y: data.y }),
          renderer.framedGraphToViewport({ x: data.x, y: data.y }),
        ];
        let point = points[0];
        let bestScore = Number.POSITIVE_INFINITY;
        for (const candidate of points) {
          const dx = candidate.x < 0 ? -candidate.x : Math.max(0, candidate.x - dims.width);
          const dy = candidate.y < 0 ? -candidate.y : Math.max(0, candidate.y - dims.height);
          const score = dx + dy;
          if (score < bestScore) {
            bestScore = score;
            point = candidate;
          }
        }
        const isFileLabel = data.node_type === "__label__";
        const fontSize = isFileLabel ? 11 : 12;
        const padX = isFileLabel ? 6 : 8;
        const padY = isFileLabel ? 3 : 4;
        if (!labelMeasureContext) return;
        const fontWeight = isFileLabel ? "600" : "500";
        labelMeasureContext.font = `${fontWeight} ${fontSize}px "IBM Plex Mono", "IBM Plex Sans", sans-serif`;
        const textWidth = labelMeasureContext.measureText(String(data.label)).width;
        const boxWidth = textWidth + padX * 2;
        const boxHeight = fontSize + padY * 2;
        const left = point.x - boxWidth / 2;
        const top = point.y - boxHeight / 2;
        for (const clickPoint of clickCandidates) {
          if (
            clickPoint.x >= left &&
            clickPoint.x <= left + boxWidth &&
            clickPoint.y >= top &&
            clickPoint.y <= top + boxHeight &&
            boxWidth * boxHeight < minArea
          ) {
            winner = nodeId;
            minArea = boxWidth * boxHeight;
          }
        }
      });
      return winner;
    }

    renderer.on("beforeRender", () => {
      nodeLabelHitboxes.clear();
      if (!filterState.showBoundingBoxes) return;

      const context = renderer.getCanvases()?.edges?.getContext("2d");
      if (!context) return;
      const cameraRatio = renderer.getCamera().getState().ratio || 1;
      const zoomOut = Math.max(1, cameraRatio);
      const minHeaderWidth = 120 * Math.min(2.6, zoomOut);
      const minHeaderHeight = 42 * Math.min(2.2, zoomOut);
      context.save();
      for (const [dirId, box] of boundingBoxes) {
        const tl = renderer.graphToViewport({ x: box.x, y: box.y });
        const br = renderer.graphToViewport({ x: box.x + box.w, y: box.y - box.h });
        const screenW = br.x - tl.x;
        const screenH = br.y - tl.y;
        if (screenW < 2 || screenH < 2) continue;

        const depth = box.depth || 0;
        const depthFade = depth > 1 ? Math.min(0.65, (depth - 1) * 0.12 * zoomOut) : 0;
        const fillAlpha = Math.max(0.03, 0.07 + depth * 0.02 - depthFade * 0.4);
        const strokeAlpha = Math.max(0.08, 0.22 + depth * 0.06 - depthFade);
        const labelAlpha = 0.55 + depth * 0.1;

        context.fillStyle = "rgba(148, 163, 184, " + fillAlpha + ")";
        context.strokeStyle = "rgba(148, 163, 184, " + strokeAlpha + ")";
        context.lineWidth = 1;
        drawRoundedRect(context, tl.x, tl.y, screenW, screenH, 8);
        context.fill();
        context.stroke();

        context.fillStyle = "rgba(148, 163, 184, " + labelAlpha + ")";
        context.font = '600 11px "IBM Plex Mono", "IBM Plex Sans", sans-serif';
        context.textAlign = "left";
        context.textBaseline = "top";
        if (depth <= 2 && screenW >= minHeaderWidth && screenH >= minHeaderHeight) {
          context.fillText(box.label + "/", tl.x + 8, tl.y + 5);
        }
      }
      context.restore();
    });

    renderer.on("clickNode", ({ node }) => {
      if (graph.hasNode(node) && graph.getNodeAttribute(node, "node_type") === "__label__") return;
      selectNode(node);
    });

    renderer.on("clickStage", ({ event }) => {
      const hitNode = hitTestLabeledNode(event);
      if (!hitNode) return;
      selectNode(hitNode);
    });

    let hoveredNode = null;

    renderer.on("enterNode", ({ node }) => {
      hoveredNode = node;
      const neighbors = new Set(graph.neighbors(node));
      neighbors.add(node);

      graph.forEachNode((id) => {
        graph.setNodeAttribute(id, "dimmed", !neighbors.has(id));
      });
      graph.forEachEdge((edge, attrs, src, tgt) => {
        if (!neighbors.has(src) || !neighbors.has(tgt)) {
          graph.setEdgeAttribute(edge, "hidden", true);
        }
      });
      renderer.refresh();
    });

    renderer.on("leaveNode", () => {
      hoveredNode = null;
      graph.forEachNode((id) => {
        graph.removeNodeAttribute(id, "dimmed");
      });
      applyFilters();
    });

    document.getElementById("zoom-in").addEventListener("click", () => {
      const camera = renderer.getCamera();
      camera.animatedZoom({ duration: 200 });
    });
    document.getElementById("zoom-out").addEventListener("click", () => {
      const camera = renderer.getCamera();
      camera.animatedUnzoom({ duration: 200 });
    });
    document.getElementById("zoom-reset").addEventListener("click", () => {
      applyCustomFit(200);
    });

    document.getElementById("send-chat").addEventListener("click", async () => {
      const message = document.getElementById("chat-input").value.trim();
      if (!selectedNode || !message) return;
      cacheEvent("agent_message", {
        from_agent: "user",
        to_agent: selectedNode,
        content: message,
      });
      renderAgentPanel(selectedNode);
      await fetch("/api/chat", {
        method: "POST",
        headers: {"content-type": "application/json"},
        body: JSON.stringify({ node_id: selectedNode, message })
      });
      document.getElementById("chat-input").value = "";
    });

    document.getElementById("agent-stream").addEventListener("click", async (event) => {
      const requestId = event.target?.dataset?.requestSubmit;
      if (requestId && selectedNode) {
        const input = document.querySelector(`textarea[data-request-input=\"${requestId}\"]`);
        const responseText = input?.value?.trim?.() || "";
        if (!responseText) return;
        await fetch(`/api/nodes/${encodeURIComponent(selectedNode)}/respond`, {
          method: "POST",
          headers: {"content-type": "application/json"},
          body: JSON.stringify({ request_id: requestId, response: responseText })
        });
        if (input) input.value = "";
        return;
      }

      const proposalNodeDiff = event.target?.dataset?.proposalDiff;
      if (proposalNodeDiff) {
        const response = await fetch(`/api/proposals/${encodeURIComponent(proposalNodeDiff)}/diff`);
        if (!response.ok) return;
        const payload = await response.json();
        const target = document.querySelector(`[data-proposal-diff-output=\"${proposalNodeDiff}\"]`);
        if (!target) return;
        const diffText = (payload.diffs || [])
          .map((item) => `# ${item.file}\n${renderSimpleDiff(item.old, item.new)}`)
          .join("\n\n");
        target.style.display = "block";
        target.textContent = diffText || "(no diff)";
        return;
      }

      const proposalNodeAccept = event.target?.dataset?.proposalAccept;
      if (proposalNodeAccept) {
        await fetch(`/api/proposals/${encodeURIComponent(proposalNodeAccept)}/accept`, {
          method: "POST",
          headers: {"content-type": "application/json"},
          body: "{}",
        });
        return;
      }

      const proposalNodeReject = event.target?.dataset?.proposalReject;
      if (proposalNodeReject) {
        await fetch(`/api/proposals/${encodeURIComponent(proposalNodeReject)}/reject`, {
          method: "POST",
          headers: {"content-type": "application/json"},
          body: JSON.stringify({ feedback: "Rejected from web panel" }),
        });
      }
    });

    document.getElementById("filter-bar").addEventListener("click", (event) => {
      const chip = event.target.closest(".filter-chip");
      if (!chip) return;

      const nodeType = chip.dataset.filterNode;
      const edgeType = chip.dataset.filterEdge;
      const edgeEmphasis = chip.dataset.filterEdgeEmphasis;
      const boxToggle = chip.dataset.filterBoxes;

      if (nodeType) {
        chip.classList.toggle("active");
        if (filterState.hiddenNodeTypes.has(nodeType)) {
          filterState.hiddenNodeTypes.delete(nodeType);
        } else {
          filterState.hiddenNodeTypes.add(nodeType);
        }
      }

      if (edgeType) {
        chip.classList.toggle("active");
        if (filterState.hiddenEdgeTypes.has(edgeType)) {
          filterState.hiddenEdgeTypes.delete(edgeType);
        } else {
          filterState.hiddenEdgeTypes.add(edgeType);
        }
      }

      if (edgeEmphasis === "cross-file") {
        filterState.edgeEmphasisCrossFileOnly = !filterState.edgeEmphasisCrossFileOnly;
        chip.classList.toggle("active", filterState.edgeEmphasisCrossFileOnly);
      }

      if (boxToggle) {
        chip.classList.toggle("active");
        filterState.showBoundingBoxes = !filterState.showBoundingBoxes;
      }

      applyFilters();
    });

    function ssePayload(event) {
      const data = JSON.parse(event.data);
      return data.payload || data;
    }
    function setConnectionStatus(connected) {
      const indicator = document.getElementById("connection-status");
      if (!indicator) return;
      indicator.classList.toggle("connected", connected);
      indicator.classList.toggle("disconnected", !connected);
    }

    function createEventSource() {
      const evtSource = new EventSource("/sse?replay=50");

      evtSource.onopen = () => {
        setConnectionStatus(true);
      };

      evtSource.onerror = () => {
        setConnectionStatus(false);
        if (evtSource.readyState === EventSource.CLOSED) {
          setTimeout(createEventSource, 2000);
        }
      };

      evtSource.addEventListener("node_discovered", async (event) => {
        const payload = ssePayload(event);
        // Re-run layout using authoritative API state to keep incremental discovery
        // aligned with the current deterministic positioning strategy.
        await loadGraph();
        renderer.refresh();
        appendEventLine(`node_discovered: ${payload.node_id}`);
        addTimelineEvent("node_discovered", payload);
      });
      evtSource.addEventListener("node_removed", (event) => {
        const payload = ssePayload(event);
        if (graph.hasNode(payload.node_id)) {
          graph.dropNode(payload.node_id);
          renderer.refresh();
        }
        appendEventLine(`node_removed: ${payload.node_id}`);
        addTimelineEvent("node_removed", payload);
      });
      evtSource.addEventListener("node_changed", (event) => {
        const payload = ssePayload(event);
        appendEventLine(`node_changed: ${payload.node_id}`);
        addTimelineEvent("node_changed", payload);
      });
      evtSource.addEventListener("agent_start", (event) => {
        const payload = ssePayload(event);
        cacheEvent("agent_start", payload);
        if (graph.hasNode(payload.agent_id)) {
          graph.setNodeAttribute(payload.agent_id, "color", nodeColor("", "running"));
          renderer.refresh();
        }
        appendEventLine(`agent_start: ${payload.agent_id}`);
        addTimelineEvent("agent_start", payload);
        if (selectedNode === payload.agent_id) renderAgentPanel(selectedNode);
      });
      evtSource.addEventListener("agent_complete", (event) => {
        const payload = ssePayload(event);
        cacheEvent("agent_complete", payload);
        if (graph.hasNode(payload.agent_id)) {
          const nodeType = graph.getNodeAttribute(payload.agent_id, "node_type");
          graph.setNodeAttribute(payload.agent_id, "color", nodeColor(nodeType, "idle"));
          renderer.refresh();
        }
        appendEventLine(`agent_complete: ${payload.agent_id}`);
        addTimelineEvent("agent_complete", payload);
        if (selectedNode === payload.agent_id) renderAgentPanel(selectedNode);
      });
      evtSource.addEventListener("agent_error", (event) => {
        const payload = ssePayload(event);
        cacheEvent("agent_error", payload);
        if (graph.hasNode(payload.agent_id)) {
          graph.setNodeAttribute(payload.agent_id, "color", nodeColor("", "error"));
          renderer.refresh();
        }
        appendEventLine(`agent_error: ${payload.agent_id}`);
        addTimelineEvent("agent_error", payload);
        if (selectedNode === payload.agent_id) renderAgentPanel(selectedNode);
      });
      evtSource.addEventListener("agent_message", (event) => {
        const payload = ssePayload(event);
        cacheEvent("agent_message", payload);
        appendEventLine(`agent_message: ${payload.from_agent} → ${payload.to_agent}`);
        addTimelineEvent("agent_message", payload);
        if (selectedNode && (selectedNode === payload.to_agent || selectedNode === payload.from_agent)) {
          renderAgentPanel(selectedNode);
        }
      });
      evtSource.addEventListener("human_input_request", (event) => {
        const payload = ssePayload(event);
        cacheEvent("human_input_request", payload);
        if (graph.hasNode(payload.agent_id)) {
          graph.setNodeAttribute(payload.agent_id, "color", nodeColor("", "awaiting_input"));
          renderer.refresh();
        }
        addTimelineEvent("human_input_request", payload);
        if (selectedNode === payload.agent_id) renderAgentPanel(selectedNode);
      });
      evtSource.addEventListener("human_input_response", (event) => {
        const payload = ssePayload(event);
        cacheEvent("human_input_response", payload);
        addTimelineEvent("human_input_response", payload);
        if (selectedNode === payload.agent_id) renderAgentPanel(selectedNode);
      });
      evtSource.addEventListener("rewrite_proposal", (event) => {
        const payload = ssePayload(event);
        cacheEvent("rewrite_proposal", payload);
        if (graph.hasNode(payload.agent_id)) {
          graph.setNodeAttribute(payload.agent_id, "color", nodeColor("", "awaiting_review"));
          renderer.refresh();
        }
        addTimelineEvent("rewrite_proposal", payload);
        if (selectedNode === payload.agent_id) renderAgentPanel(selectedNode);
      });
      evtSource.addEventListener("rewrite_accepted", (event) => {
        const payload = ssePayload(event);
        cacheEvent("rewrite_accepted", payload);
        addTimelineEvent("rewrite_accepted", payload);
        if (selectedNode === payload.agent_id) renderAgentPanel(selectedNode);
      });
      evtSource.addEventListener("rewrite_rejected", (event) => {
        const payload = ssePayload(event);
        cacheEvent("rewrite_rejected", payload);
        addTimelineEvent("rewrite_rejected", payload);
        if (selectedNode === payload.agent_id) renderAgentPanel(selectedNode);
      });
      evtSource.addEventListener("cursor_focus", (event) => {
        const payload = ssePayload(event);
        const panel = document.getElementById("companion-panel");

        if (!payload.node_id) {
          panel.style.display = "none";
          return;
        }

        panel.style.display = "block";
        document.getElementById("companion-node-name").textContent = payload.node_name || payload.node_id;
        document.getElementById("companion-meta").textContent =
          `${payload.node_type || "unknown"} · ${payload.file_path}:${payload.line}`;

        fetch(`/api/nodes/${encodeURIComponent(payload.node_id)}`)
          .then((response) => response.json())
          .then((node) => {
            if (node.text) {
              document.getElementById("companion-source").textContent = node.text;
            } else {
              document.getElementById("companion-source").textContent = "(no source)";
            }
          })
          .catch(() => {
            document.getElementById("companion-source").textContent = "(failed to load)";
          });

        if (graph.hasNode(payload.node_id)) {
          const prevSize = graph.getNodeAttribute(payload.node_id, "size");
          graph.setNodeAttribute(payload.node_id, "size", prevSize * 1.5);

          const nodePos = graph.getNodeAttributes(payload.node_id);
          const camera = renderer.getCamera();
          camera.animate({ x: nodePos.x, y: nodePos.y, ratio: 0.5 }, { duration: 300 });

          renderer.refresh();
          setTimeout(() => {
            if (graph.hasNode(payload.node_id)) {
              graph.setNodeAttribute(payload.node_id, "size", prevSize);
              renderer.refresh();
            }
          }, 500);
        }
        addTimelineEvent("cursor_focus", payload);
        if (payload.node_id) {
          selectNode(payload.node_id);
        }
      });
      evtSource.onmessage = (event) => {
        try {
          const payload = JSON.parse(event.data);
          appendEventLine(`${payload.event_type || "Event"}: ${payload.correlation_id || ""}`);
          addTimelineEvent(payload.event_type || "Event", payload.payload || payload);
        } catch {
          appendEventLine(event.data);
          addTimelineEvent("Event", { content: event.data });
        }
      };
    }

    createEventSource();
    loadGraph().then(() => {
      const requestedNode = new URLSearchParams(window.location.search).get("node");
      if (requestedNode) {
        selectNode(requestedNode);
      }
    });
  </script>
</body>
</html>
