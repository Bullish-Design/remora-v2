<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Remora - Agent Graph</title>
  <script src="https://unpkg.com/graphology@0.25.4/dist/graphology.umd.min.js"></script>
  <script src="https://unpkg.com/sigma@3.0.0-beta.31/build/sigma.min.js"></script>
  <script src="https://unpkg.com/graphology-layout-forceatlas2@0.10.1/build/graphology-layout-forceatlas2.min.js"></script>
  <style>
    :root {
      --bg: #f6f2ea;
      --panel: #ffffff;
      --ink: #1f1a16;
      --muted: #6f645c;
      --line: #d8cec3;
      --accent: #0f766e;
      --running: #ea580c;
      --done: #15803d;
      --error: #b91c1c;
      --function: #2563eb;
      --class: #7c3aed;
      --method: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(1200px 800px at 10% 0%, #fff8ec, var(--bg));
      color: var(--ink);
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      display: flex;
      min-height: 100vh;
    }
    #graph { flex: 1; min-height: 100vh; }
    #sidebar {
      width: min(440px, 92vw);
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
      overflow-y: auto;
    }
    h1 { margin: 0 0 12px; font-size: 1.1rem; letter-spacing: 0.02em; }
    .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 12px; }
    #node-details pre {
      max-height: 220px;
      overflow: auto;
      background: #f9f6f0;
      border: 1px solid var(--line);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.8rem;
    }
    textarea, button {
      font-family: inherit;
      font-size: 0.9rem;
    }
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      margin: 6px 0;
      background: #fffcf7;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      background: var(--accent);
      color: white;
      margin-right: 6px;
    }
    #events {
      max-height: 180px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f9f6f0;
      padding: 8px;
      font-size: 0.82rem;
      white-space: pre-wrap;
    }
  </style>
</head>
  <!-- Configure Sigma via the data attribute below. Increase `data-sigma-iterations` for slower, smoother layouts. -->
<body data-sigma-iterations="30">
  <div id="graph"></div>
  <aside id="sidebar">
    <h1>Remora</h1>
    <div class="meta">Live agent graph</div>
    <section>
      <div id="companion-panel" style="
        display: none;
        padding: 12px;
        margin-bottom: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f9f6f0;
      ">
        <div style="font-size: 11px; color: var(--muted); margin-bottom: 4px;">
          FOLLOWING CURSOR
        </div>
        <div id="companion-node-name" style="
          font-weight: bold;
          font-size: 16px;
          color: var(--accent);
          margin-bottom: 8px;
        "></div>
        <div id="companion-meta" style="
          font-size: 12px;
          color: var(--muted);
          margin-bottom: 8px;
        "></div>
        <div id="companion-source" style="
          font-family: monospace;
          font-size: 11px;
          background: #fffcf7;
          padding: 8px;
          border-radius: 4px;
          max-height: 200px;
          overflow-y: auto;
          white-space: pre-wrap;
          color: #1f1a16;
        "></div>
      </div>
    </section>
    <section>
      <h2 id="node-name">Select a node</h2>
      <div id="node-details"></div>
    </section>
    <section>
      <h3>Chat</h3>
      <div id="chat-messages" style="
        max-height: 300px;
        overflow-y: auto;
        padding: 8px;
        margin-bottom: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f9f6f0;
        display: none;
      "></div>
      <textarea id="chat-input" rows="4" placeholder="Ask selected node..."></textarea>
      <button id="send-chat">Send</button>
    </section>
    <section>
      <h3>Events</h3>
      <div id="events"></div>
    </section>
  </aside>
  <script>
    const graph = new graphology.Graph();
    const renderer = new Sigma(graph, document.getElementById("graph"));
    const SIGMA_ITERATIONS = Number(document.body.dataset.sigmaIterations) || 30;
    let selectedNode = null;

    const colorByType = {
      function: getComputedStyle(document.documentElement).getPropertyValue("--function").trim(),
      class: getComputedStyle(document.documentElement).getPropertyValue("--class").trim(),
      method: getComputedStyle(document.documentElement).getPropertyValue("--method").trim()
    };

    function nodeColor(nodeType, status) {
      if (status === "running") {
        return getComputedStyle(document.documentElement)
          .getPropertyValue("--running")
          .trim();
      }
      if (status === "error") {
        return getComputedStyle(document.documentElement)
          .getPropertyValue("--error")
          .trim();
      }
      if (status === "idle") return colorByType[nodeType] || "#4f46e5";
      return getComputedStyle(document.documentElement).getPropertyValue("--done").trim();
    }

    function hashNodeId(nodeId) {
      let hash = 5381;
      for (let i = 0; i < nodeId.length; i++) {
        hash = (hash * 33) ^ nodeId.charCodeAt(i);
      }
      return hash >>> 0;
    }

    function deterministicPosition(nodeId) {
      const hash = hashNodeId(nodeId);
      const radius = 0.25 + ((hash % 100) / 100) * 0.5;
      const angle = (hash % 360) * (Math.PI / 180);
      return {
        x: 0.5 + radius * Math.cos(angle),
        y: 0.5 + radius * Math.sin(angle),
      };
    }

    async function loadGraph() {
      const nodesResp = await fetch("/api/nodes");
      const nodes = await nodesResp.json();
      for (const node of nodes) {
        if (!graph.hasNode(node.node_id)) {
          const { x, y } = deterministicPosition(node.node_id);
          graph.addNode(node.node_id, {
            label: node.name,
            size: 8,
            x,
            y,
            color: nodeColor(node.node_type, node.status),
            node_type: node.node_type
          });
        }
      }

      const edgeResp = await fetch("/api/edges");
      const edges = await edgeResp.json();
      for (const edge of edges) {
        const key = `${edge.from_id}->${edge.to_id}:${edge.edge_type}`;
        if (!graph.hasNode(edge.from_id) || !graph.hasNode(edge.to_id)) continue;
        if (!graph.hasEdge(key)) {
          graph.addEdgeWithKey(key, edge.from_id, edge.to_id, { label: edge.edge_type, size: 1 });
        }
      }

      if (window.graphologyLayoutForceatlas2) {
        window.graphologyLayoutForceatlas2.assign(graph, { iterations: SIGMA_ITERATIONS });
      }
      renderer.refresh();
    }

    function appendEventLine(text) {
      const box = document.getElementById("events");
      box.textContent = `${text}\n${box.textContent}`.slice(0, 4000);
    }

    function appendChatMessage(sender, content, role) {
      const container = document.getElementById("chat-messages");
      container.style.display = "block";
      const msg = document.createElement("div");
      msg.style.cssText = `
        margin-bottom: 8px;
        padding: 8px;
        border-radius: 6px;
        background: ${role === "agent" ? "#f1f5f9" : "#e0f2f1"};
        color: #1f1a16;
        font-size: 13px;
        word-wrap: break-word;
      `;
      const senderLabel = document.createElement("div");
      senderLabel.style.cssText = "font-weight: bold; margin-bottom: 4px; color: var(--accent); font-size: 11px;";
      senderLabel.textContent = sender.split("::").pop();
      msg.appendChild(senderLabel);

      const text = document.createElement("div");
      text.textContent = content;
      msg.appendChild(text);

      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }

    async function showNode(nodeId) {
      const response = await fetch(`/api/nodes/${encodeURIComponent(nodeId)}`);
      if (!response.ok) return;
      const node = await response.json();
      document.getElementById("node-name").textContent = node.full_name;
      const details = document.getElementById("node-details");
      details.innerHTML = "";

      const typeDiv = document.createElement("div");
      typeDiv.textContent = `Type: ${node.node_type}`;
      details.appendChild(typeDiv);

      const statusDiv = document.createElement("div");
      statusDiv.textContent = `Status: ${node.status}`;
      details.appendChild(statusDiv);

      const fileDiv = document.createElement("div");
      fileDiv.textContent = `File: ${node.file_path}:${node.start_line}-${node.end_line}`;
      details.appendChild(fileDiv);

      const pre = document.createElement("pre");
      pre.textContent = node.source_code;
      details.appendChild(pre);
      selectedNode = node.node_id;
    }

    function selectNode(nodeId) {
      selectedNode = nodeId;
      const chat = document.getElementById("chat-messages");
      chat.innerHTML = "";
      chat.style.display = "none";
      showNode(nodeId);
    }

    renderer.on("clickNode", ({ node }) => {
      selectNode(node);
    });

    document.getElementById("send-chat").addEventListener("click", async () => {
      const message = document.getElementById("chat-input").value.trim();
      if (!selectedNode || !message) return;
      appendChatMessage("You", message, "user");
      await fetch("/api/chat", {
        method: "POST",
        headers: {"content-type": "application/json"},
        body: JSON.stringify({ node_id: selectedNode, message })
      });
      document.getElementById("chat-input").value = "";
    });

    const evtSource = new EventSource('/sse');
    function ssePayload(event) {
      const data = JSON.parse(event.data);
      return data.payload || data;
    }
    evtSource.addEventListener("NodeDiscoveredEvent", (event) => {
      const payload = ssePayload(event);
      if (!graph.hasNode(payload.node_id)) {
        const { x, y } = deterministicPosition(payload.node_id);
        graph.addNode(payload.node_id, {
          label: payload.name || payload.node_id.split("::").pop(),
          size: 8,
          x,
          y,
          node_type: payload.node_type || "function",
          color: nodeColor(payload.node_type || "function", "idle")
        });
      }
      renderer.refresh();
      appendEventLine(`NodeDiscoveredEvent: ${payload.node_id}`);
    });
    evtSource.addEventListener("NodeRemovedEvent", (event) => {
      const payload = ssePayload(event);
      if (graph.hasNode(payload.node_id)) {
        graph.dropNode(payload.node_id);
        renderer.refresh();
      }
      appendEventLine(`NodeRemovedEvent: ${payload.node_id}`);
    });
    evtSource.addEventListener("NodeChangedEvent", (event) => {
      const payload = ssePayload(event);
      appendEventLine(`NodeChangedEvent: ${payload.node_id}`);
    });
    evtSource.addEventListener("AgentStartEvent", (event) => {
      const payload = ssePayload(event);
      if (graph.hasNode(payload.agent_id)) {
        graph.setNodeAttribute(payload.agent_id, "color", nodeColor("", "running"));
        renderer.refresh();
      }
      appendEventLine(`AgentStartEvent: ${payload.agent_id}`);
    });
    evtSource.addEventListener("AgentCompleteEvent", (event) => {
      const payload = ssePayload(event);
      if (graph.hasNode(payload.agent_id)) {
        const nodeType = graph.getNodeAttribute(payload.agent_id, "node_type");
        graph.setNodeAttribute(payload.agent_id, "color", nodeColor(nodeType, "idle"));
        renderer.refresh();
      }
      appendEventLine(`AgentCompleteEvent: ${payload.agent_id}`);
    });
    evtSource.addEventListener("AgentErrorEvent", (event) => {
      const payload = ssePayload(event);
      if (graph.hasNode(payload.agent_id)) {
        graph.setNodeAttribute(payload.agent_id, "color", nodeColor("", "error"));
        renderer.refresh();
      }
      appendEventLine(`AgentErrorEvent: ${payload.agent_id}`);
    });
    evtSource.addEventListener("AgentMessageEvent", (event) => {
      const payload = ssePayload(event);
      if (payload.to_agent === "user") {
        appendChatMessage(payload.from_agent || "agent", payload.content || "", "agent");
      }
      appendEventLine(`AgentMessageEvent: ${payload.from_agent} → ${payload.to_agent}`);
    });
    evtSource.addEventListener("CursorFocusEvent", (event) => {
      const payload = ssePayload(event);
      const panel = document.getElementById("companion-panel");

      if (!payload.node_id) {
        panel.style.display = "none";
        return;
      }

      panel.style.display = "block";
      document.getElementById("companion-node-name").textContent = payload.node_name || payload.node_id;
      document.getElementById("companion-meta").textContent =
        `${payload.node_type || "unknown"} · ${payload.file_path}:${payload.line}`;

      fetch(`/api/nodes/${encodeURIComponent(payload.node_id)}`)
        .then((response) => response.json())
        .then((node) => {
          if (node.source_code) {
            document.getElementById("companion-source").textContent = node.source_code;
          } else {
            document.getElementById("companion-source").textContent = "(no source)";
          }
        })
        .catch(() => {
          document.getElementById("companion-source").textContent = "(failed to load)";
        });

      if (graph.hasNode(payload.node_id)) {
        const prevSize = graph.getNodeAttribute(payload.node_id, "size");
        graph.setNodeAttribute(payload.node_id, "size", prevSize * 1.5);

        const nodePos = graph.getNodeAttributes(payload.node_id);
        const camera = renderer.getCamera();
        camera.animate({ x: nodePos.x, y: nodePos.y, ratio: 0.5 }, { duration: 300 });

        renderer.refresh();
        setTimeout(() => {
          if (graph.hasNode(payload.node_id)) {
            graph.setNodeAttribute(payload.node_id, "size", prevSize);
            renderer.refresh();
          }
        }, 500);
      }
    });
    evtSource.onmessage = (event) => {
      try {
        const payload = JSON.parse(event.data);
        appendEventLine(`${payload.event_type || "Event"}: ${payload.correlation_id || ""}`);
      } catch {
        appendEventLine(event.data);
      }
    };

    loadGraph();
  </script>
</body>
</html>
