<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Remora - Agent Graph</title>
  <script src="/static/vendor/graphology.umd.min.js"></script>
  <script src="/static/vendor/sigma.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a1018;
      --panel: #101826;
      --ink: #e5edf7;
      --muted: #9fb2c8;
      --line: #233247;
      --accent: #22d3ee;
      --running: #fb923c;
      --done: #34d399;
      --error: #f87171;
      --function: #60a5fa;
      --class: #a78bfa;
      --method: #22d3ee;
      --section: #fbbf24;
      --table: #34d399;
      --virtual: #f472b6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      display: flex;
      min-height: 100vh;
    }
    #sidebar {
      width: clamp(320px, 30vw, 400px);
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 18px;
      overflow-y: auto;
    }
    @media (max-width: 1180px) {
      #sidebar {
        width: clamp(300px, 36vw, 380px);
      }
    }
    h1 { margin: 0 0 12px; font-size: 1.1rem; letter-spacing: 0.02em; }
    #connection-status.connected { color: #34d399; }
    #connection-status.disconnected {
      color: #f87171;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 12px; }
    #node-details pre {
      max-height: 220px;
      overflow: auto;
      background: #111b2b;
      border: 1px solid var(--line);
      padding: 10px;
      border-radius: 8px;
      font-size: 0.8rem;
    }
    textarea, button {
      font-family: inherit;
      font-size: 0.9rem;
    }
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      margin: 6px 0;
      background: #111b2b;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      background: var(--accent);
      color: #03131d;
      margin-right: 6px;
    }
    #events {
      max-height: 180px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111b2b;
      padding: 8px;
      font-size: 0.82rem;
      white-space: pre-wrap;
    }
    #timeline-container {
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111b2b;
      padding: 8px;
      font-size: 0.78rem;
    }
    .timeline-event {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 4px 10px;
      padding: 6px 8px;
      border-left: 3px solid #9fb2c8;
      margin-bottom: 6px;
      background: #111b2b;
    }
    .timeline-event .timeline-type {
      font-weight: 700;
      color: var(--ink);
    }
    .timeline-event .timeline-meta {
      color: var(--muted);
    }
    .timeline-event.type-agent_start { border-color: #60a5fa; }
    .timeline-event.type-agent_complete { border-color: #34d399; }
    .timeline-event.type-agent_error { border-color: #f87171; }
    .timeline-event.type-agent_message { border-color: #fb923c; }
    .timeline-event.type-content_changed { border-color: #a78bfa; }
    #agent-panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #111b2b;
      padding: 10px;
      margin-top: 12px;
    }
    #agent-header {
      font-size: 0.86rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    #agent-stream {
      max-height: 320px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111b2b;
      padding: 8px;
      margin-bottom: 8px;
    }
    .panel-item {
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #111b2b;
    }
    .panel-user {
      border-left: 4px solid #22d3ee;
      background: #103041;
    }
    .panel-agent {
      border-left: 4px solid #60a5fa;
    }
    .panel-error {
      border-left: 4px solid #f87171;
      background: #3d1d27;
    }
    .panel-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .proposal-actions {
      margin-top: 8px;
    }
    .proposal-actions button {
      margin-bottom: 4px;
    }
    .diff-block {
      margin-top: 8px;
      max-height: 180px;
      overflow: auto;
      background: #111b2b;
      border-radius: 6px;
      padding: 8px;
      font-family: monospace;
      font-size: 0.74rem;
      white-space: pre-wrap;
    }
    #graph-container {
      position: relative;
      flex: 1;
      min-height: 100vh;
    }
    #graph {
      flex: 1;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #filter-bar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      max-width: 260px;
      padding: 6px 10px;
      background: rgba(16, 24, 38, 0.85);
      border: 1px solid var(--line);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      pointer-events: none;
    }
    .filter-group {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .filter-separator {
      width: 100%;
      height: 1px;
      background: var(--line);
      margin: 2px 0;
    }
    .filter-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      transition: opacity 0.15s, background 0.15s;
      opacity: 0.45;
      pointer-events: auto;
    }
    .filter-chip.active {
      opacity: 1;
      background: rgba(255, 255, 255, 0.06);
      color: var(--ink);
    }
    .chip-swatch {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    #zoom-controls {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
    }
    #zoom-controls button {
      width: 32px;
      height: 32px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(16, 24, 38, 0.85);
      color: var(--ink);
      cursor: pointer;
      backdrop-filter: blur(6px);
      pointer-events: auto;
    }
    #zoom-controls button:hover {
      background: rgba(34, 211, 238, 0.15);
    }
  </style>
</head>
<body>
  <div id="graph-container">
    <div id="filter-bar">
      <div class="filter-group">
        <button class="filter-chip active" data-filter-node="class">
          <span class="chip-swatch" style="background: var(--class);"></span>
          classes
        </button>
        <button class="filter-chip active" data-filter-node="function">
          <span class="chip-swatch" style="background: var(--function);"></span>
          functions
        </button>
        <button class="filter-chip active" data-filter-node="method">
          <span class="chip-swatch" style="background: var(--method);"></span>
          methods
        </button>
        <button class="filter-chip active" data-filter-node="section">
          <span class="chip-swatch" style="background: var(--section);"></span>
          sections
        </button>
        <button class="filter-chip active" data-filter-node="virtual">
          <span class="chip-swatch" style="background: var(--virtual);"></span>
          virtual
        </button>
      </div>
      <div class="filter-separator"></div>
      <div class="filter-group">
        <button class="filter-chip active" data-filter-edge="imports">
          <span class="chip-swatch" style="background: var(--function);"></span>
          imports
        </button>
        <button class="filter-chip active" data-filter-edge="inherits">
          <span class="chip-swatch" style="background: var(--class);"></span>
          inherits
        </button>
        <button class="filter-chip" data-filter-edge-emphasis="cross-file">
          <span class="chip-swatch" style="background: #7cc4ff;"></span>
          cross-file
        </button>
        <button class="filter-chip active" data-filter-tethers="context">
          <span class="chip-swatch" style="background: #94a3b8;"></span>
          context tethers
        </button>
      </div>
      <div class="filter-separator"></div>
      <div class="filter-group">
        <button class="filter-chip active" data-filter-boxes="filesystem">
          <span class="chip-swatch" style="background: var(--muted);"></span>
          filesystem
        </button>
      </div>
    </div>
    <div id="graph"></div>
    <div id="zoom-controls">
      <button id="zoom-in" title="Zoom in">+</button>
      <button id="zoom-out" title="Zoom out">&minus;</button>
      <button id="zoom-reset" title="Fit to view">&#8862;</button>
    </div>
  </div>
  <aside id="sidebar">
    <h1>
      Remora
      <span id="connection-status" class="connected" title="SSE connection status">●</span>
    </h1>
    <div class="meta">Live agent graph</div>
    <section>
      <div id="companion-panel" style="
        display: none;
        padding: 12px;
        margin-bottom: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #111b2b;
      ">
        <div style="font-size: 11px; color: var(--muted); margin-bottom: 4px;">
          FOLLOWING CURSOR
        </div>
        <div id="companion-node-name" style="
          font-weight: bold;
          font-size: 16px;
          color: var(--accent);
          margin-bottom: 8px;
        "></div>
        <div id="companion-meta" style="
          font-size: 12px;
          color: var(--muted);
          margin-bottom: 8px;
        "></div>
        <div id="companion-source" style="
          font-family: monospace;
          font-size: 11px;
          background: #111b2b;
          padding: 8px;
          border-radius: 4px;
          max-height: 200px;
          overflow-y: auto;
          white-space: pre-wrap;
          color: #e5edf7;
        "></div>
      </div>
    </section>
    <section>
      <h2 id="node-name">Select a node</h2>
      <div id="node-details"></div>
    </section>
    <section id="agent-panel">
      <h3>Agent Panel</h3>
      <div id="agent-header">(select a node)</div>
      <div id="agent-stream"></div>
      <textarea id="chat-input" rows="3" placeholder="Send message to selected agent..."></textarea>
      <button id="send-chat">Send</button>
    </section>
    <section>
      <h3>Events</h3>
      <div id="events"></div>
    </section>
    <section>
      <h3>Timeline</h3>
      <div id="timeline-container"></div>
    </section>
  </aside>
  <script>
    const graph = new graphology.Graph();
    const nodeLabelHitboxes = new Map();
    const labelMeasureCanvas = document.createElement("canvas");
    const labelMeasureContext = labelMeasureCanvas.getContext("2d");
    const LAYOUT = Object.freeze({
      COL_PAD: 6.0,
      ROW_HEIGHT: 2.2,
      SUB_ROW_HEIGHT: 1.6,
      MIN_COL_WIDTH: 6.0,
      PX_PER_UNIT: 10,
      LABEL_PAD_PX: 24,
      BOX_PAD: 2.5,
      BOX_HEADER: 1.6,
      COL_WIDTH_BIAS: 2.0,
      DEPTH_Y_WEIGHT: 1.1,
      FILE_LINE_SPAN: 14.0,
      COL_Y_STAGGER: 1.2,
      WRAP_TARGET_WIDTH: 86.0,
      WRAP_TARGET_MIN_WIDTH: 56.0,
      WRAP_TARGET_MAX_WIDTH: 128.0,
      WRAP_FILL_RATIO: 0.88,
      ROW_BAND_GAP: 24.0,
      ROW_BASE_PAD: 6.0,
      MIN_COLUMN_SEPARATION: 2.6,
      MIN_NODE_GAP_Y: 1.8,
      COMPONENT_GAP_X: 10.0,
      COMPONENT_GAP_Y: 12.0,
      COMPONENT_PACK_MIN_WIDTH: 62.0,
      COMPONENT_PACK_MAX_WIDTH: 138.0,
      COMPONENT_PACK_FILL_RATIO: 0.95,
      SATELLITE_GAP_X: 3.8,
      SATELLITE_GAP_Y: 4.5,
      SATELLITE_ROW_GAP: 4.0,
      CORE_COMPONENT_MIN_SCORE: 18,
      PERIPHERAL_DOCK_GAP_X: 4.5,
      PERIPHERAL_DOCK_GAP_Y: 3.8,
      PERIPHERAL_DOCK_MAX_WIDTH: 132.0,
      PERIPHERAL_GRID_MIN_CELL_WIDTH: 19.5,
      PERIPHERAL_GRID_CELL_PAD: 3.2,
      PERIPHERAL_GRID_GAP_X: 7.4,
      PERIPHERAL_GRID_GAP_Y: 5.2,
      ZONE_GAP_MIN_UNITS: 2.8,
      ZONE_GAP_TARGET_UNITS: 3.6,
      ZONE_GAP_MAX_UNITS: 5.0,
      CORE_ZONE_MIN_VERTICAL_RATIO: 0.60,
      CORE_ZONE_SCALE_MAX: 2.4,
      CORE_ASPECT_MAX: 1.9,
      CORE_ASPECT_COMPRESS_X: 0.88,
      CORE_ASPECT_EXPAND_Y: 1.12,
      PERIPHERAL_NODE_ALPHA: 0.62,
      PERIPHERAL_EDGE_ALPHA_SCALE: 0.58,
      OCCUPANCY_TARGET_MIN: 0.35,
      OCCUPANCY_TARGET_MAX: 0.82,
      OCCUPANCY_SCALE_MIN: 0.88,
      OCCUPANCY_SCALE_MAX: 1.45,
      FIT_MIN_MEDIAN_LABEL_PX: 92,
      FIT_MARGIN_LEFT_UNITS: 7.0,
      FIT_MARGIN_RIGHT_UNITS: 2.8,
      FIT_MARGIN_TOP_UNITS: 5.5,
      FIT_MARGIN_BOTTOM_UNITS: 3.2,
      FIT_PADDING_PX: 56,
      FIT_SAFE_LEFT_PX: 264,
      FIT_SAFE_TOP_PX: 72,
      FIT_SAFE_RIGHT_PX: 24,
      FIT_SAFE_BOTTOM_PX: 48,
    });
    const LAYOUT_MODE = "v6_core_peripheral";

    function drawRoundedRect(context, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      context.beginPath();
      context.moveTo(x + r, y);
      context.lineTo(x + width - r, y);
      context.quadraticCurveTo(x + width, y, x + width, y + r);
      context.lineTo(x + width, y + height - r);
      context.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      context.lineTo(x + r, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - r);
      context.lineTo(x, y + r);
      context.quadraticCurveTo(x, y, x + r, y);
      context.closePath();
    }

    function drawNodeBoxLabel(context, data) {
      if (!data.label || data.hidden) return;

      const nodeType = data.node_type || "";
      const text = String(data.label);
      const separatorIndex = text.indexOf("::");
      const hasQualifier = separatorIndex > 0;
      const primaryText = hasQualifier ? text.slice(separatorIndex + 2) : text;
      const qualifierText = hasQualifier ? text.slice(0, separatorIndex) : "";
      const isPeripheral = data.layout_zone === "peripheral" && data.node_id !== selectedNode;

      const primaryFontSize = isPeripheral ? 11 : 14;
      const qualifierFontSize = isPeripheral ? 9 : 10;
      const padX = isPeripheral ? 8 : 10;
      const padY = isPeripheral ? 4 : 5;
      const lineGap = hasQualifier ? 2 : 0;

      context.save();
      context.font = "600 " + primaryFontSize + 'px "IBM Plex Mono", "IBM Plex Sans", sans-serif';
      const primaryWidth = context.measureText(primaryText).width;
      let qualifierWidth = 0;
      if (hasQualifier) {
        context.font = "500 " + qualifierFontSize + 'px "IBM Plex Mono", "IBM Plex Sans", sans-serif';
        qualifierWidth = context.measureText(qualifierText).width;
      }
      const textWidth = Math.max(primaryWidth, qualifierWidth);
      const contentHeight = hasQualifier
        ? (primaryFontSize + qualifierFontSize + lineGap)
        : primaryFontSize;
      const boxWidth = textWidth + padX * 2;
      const boxHeight = contentHeight + padY * 2;
      const x = data.x - boxWidth / 2;
      const y = data.y - boxHeight / 2;

      let borderRadius = 8;
      if (nodeType === "function" || nodeType === "method") {
        borderRadius = boxHeight / 2;
      }

      const fillColors = {
        class:     "rgba(167, 139, 250, 0.10)",
        function:  "rgba(96, 165, 250, 0.10)",
        method:    "rgba(34, 211, 238, 0.10)",
        section:   "rgba(251, 191, 36, 0.10)",
        table:     "rgba(52, 211, 153, 0.10)",
        virtual:   "rgba(244, 114, 182, 0.10)",
      };
      const fillColor = isPeripheral ? "rgba(18, 30, 48, 0.72)" : (fillColors[nodeType] || "rgba(10, 16, 24, 0.9)");

      drawRoundedRect(context, x, y, boxWidth, boxHeight, borderRadius);
      context.fillStyle = fillColor;
      context.fill();
      context.strokeStyle = isPeripheral ? "rgba(148, 163, 184, 0.55)" : (data.color || "#22d3ee");
      context.lineWidth = isPeripheral ? 1.1 : 1.4;

      if (
        nodeType === "method" ||
        data.status === "awaiting_input" ||
        data.status === "awaiting_review"
      ) {
        context.setLineDash([4, 3]);
      }
      context.stroke();
      context.setLineDash([]);

      if (nodeType === "class") {
        const inset = 3;
        drawRoundedRect(
          context,
          x + inset,
          y + inset,
          boxWidth - inset * 2,
          boxHeight - inset * 2,
          Math.max(2, borderRadius - inset),
        );
        context.strokeStyle = data.color || "#a78bfa";
        context.lineWidth = 0.8;
        context.stroke();
      }

      if (hasQualifier) {
        const textTop = y + padY;
        context.textAlign = "center";
        context.textBaseline = "top";
        context.font = "600 " + primaryFontSize + 'px "IBM Plex Mono", "IBM Plex Sans", sans-serif';
        context.fillStyle = data.dimmed
          ? (isPeripheral ? "rgba(229, 237, 247, 0.18)" : "rgba(229, 237, 247, 0.22)")
          : (isPeripheral ? "rgba(226, 232, 240, 0.76)" : "#f1f5f9");
        context.fillText(primaryText, data.x, textTop);
        context.font = "500 " + qualifierFontSize + 'px "IBM Plex Mono", "IBM Plex Sans", sans-serif';
        context.fillStyle = data.dimmed
          ? "rgba(148, 163, 184, 0.22)"
          : (isPeripheral ? "rgba(203, 213, 225, 0.66)" : "rgba(203, 213, 225, 0.92)");
        context.fillText(qualifierText, data.x, textTop + primaryFontSize + lineGap);
      } else {
        context.fillStyle = data.dimmed
          ? "rgba(229, 237, 247, 0.15)"
          : (isPeripheral ? "rgba(229, 237, 247, 0.72)" : "#e5edf7");
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.font = "500 " + primaryFontSize + 'px "IBM Plex Mono", "IBM Plex Sans", sans-serif';
        context.fillText(primaryText, data.x, data.y);
      }

      if (data.node_id) {
        nodeLabelHitboxes.set(data.node_id, {
          x,
          y,
          width: boxWidth,
          height: boxHeight,
          area: boxWidth * boxHeight,
        });
      }

      context.restore();
    }

    const EDGE_STYLES = Object.freeze({
      imports:  { color: "#60a5fa", size: 2.2, type: "arrow" },
      inherits: { color: "#f6c35b", size: 2.0, type: "arrow" },
    });
    const DEFAULT_EDGE_STYLE = Object.freeze({
      color: "#3a4f6a", size: 1, type: "line",
    });

    function colorWithAlpha(hex, alpha) {
      const safeAlpha = Math.max(0.05, Math.min(1, Number(alpha) || 1));
      const value = String(hex || "#94a3b8").replace("#", "").trim();
      let normalized = value;
      if (normalized.length === 3) {
        normalized = normalized
          .split("")
          .map((ch) => ch + ch)
          .join("");
      }
      if (normalized.length !== 6) return "rgba(148, 163, 184, " + safeAlpha + ")";
      const r = parseInt(normalized.slice(0, 2), 16);
      const g = parseInt(normalized.slice(2, 4), 16);
      const b = parseInt(normalized.slice(4, 6), 16);
      return "rgba(" + r + ", " + g + ", " + b + ", " + safeAlpha + ")";
    }

    const sigmaApi = globalThis.sigma || {};
    const sigmaCtorApi = globalThis.Sigma || {};
    const sigmaRendering = sigmaApi.rendering || sigmaCtorApi.rendering || Sigma.rendering || {};
    const sigmaUtils = sigmaApi.utils || sigmaCtorApi.utils || Sigma.utils || {};
    const edgeCurveProgram =
      sigmaApi.EdgeCurveProgram ||
      sigmaApi.programs?.EdgeCurveProgram ||
      sigmaCtorApi.EdgeCurveProgram ||
      sigmaCtorApi.programs?.EdgeCurveProgram ||
      sigmaRendering.EdgeCurveProgram;
    const sigmaAnimateNodes = sigmaUtils.animateNodes;
    const drawDiscNodeHover =
      sigmaRendering.drawDiscNodeHover ||
      sigmaApi.drawDiscNodeHover ||
      sigmaCtorApi.drawDiscNodeHover;

    let selectedNode = null;
    let hoveredNode = null;
    let selectedEdge = null;
    let hoveredEdge = null;
    let selectedEdgeNodes = new Set();
    let hoveredEdgeNodes = new Set();
    const renderer = new Sigma(graph, document.getElementById("graph"), {
      labelRenderedSizeThreshold: 0,
      defaultDrawNodeLabel: drawNodeBoxLabel,
      defaultDrawNodeHover: drawDiscNodeHover || undefined,
      defaultEdgeType: "arrow",
      edgeProgramClasses: edgeCurveProgram ? { curve: edgeCurveProgram } : undefined,
      stagePadding: LAYOUT.FIT_PADDING_PX,
      minCameraRatio: 0.35,
      maxCameraRatio: 3.2,
      renderEdgeLabels: true,
      edgeLabelSize: 10,
      edgeLabelColor: { color: "#9fb2c8" },
      edgeLabelFont: '"IBM Plex Mono", "IBM Plex Sans", sans-serif',
      edgeLabelWeight: "500",
      enableEdgeEvents: true,
      hideEdgesOnMove: true,
      hideLabelsOnMove: true,
      cameraPanBoundaries: true,
      zIndex: true,
      nodeReducer: (node, data) => {
        const result = { ...data };
        const inEdgeFocus =
          selectedEdgeNodes.has(node) || hoveredEdgeNodes.has(node);
        const inHoverFocus = !!hoveredNode && data.dimmed === false;
        const inSelectedFocus = node === selectedNode;
        const peripheralMuted =
          data.layout_zone === "peripheral" &&
          !inSelectedFocus &&
          !inHoverFocus &&
          !data.dimmed;

        if (peripheralMuted) {

          requiredPrefixes.add(parts.slice(0, i).join("/"));
        }
      }

      const sortedPrefixes = [...requiredPrefixes].sort(
        (a, b) => (a.split("/").length - b.split("/").length) || a.localeCompare(b),
      );
      for (const prefix of sortedPrefixes) {
        if (directoryByPrefix.has(prefix)) continue;
        const parts = prefix.split("/");
        const parentPrefix = parts.length > 1 ? parts.slice(0, -1).join("/") : "";
        const parentId = parentPrefix ? (directoryByPrefix.get(parentPrefix)?.node_id || null) : null;
        const syntheticId = "__synthetic_dir__:" + prefix;
        const synthetic = {
          node_id: syntheticId,
          parent_id: parentId,
          name: parts[parts.length - 1],
          node_type: "directory",
          file_path: prefix,
          _path_prefix: prefix,
        };
        nodeById[syntheticId] = synthetic;
        directories.push(synthetic);
        directoryByPrefix.set(prefix, synthetic);
      }

      return directories;
    }

    function layoutNodesV4FileWrap(nodes, nodeById, depthOf = computeNodeDepths(nodes, nodeById)) {
      const directories = buildDirectorySet(nodes, nodeById);
      const fileGroups = {};
      for (const n of nodes) {
        if (n.node_type === "directory") continue;
        const fp = n.file_path || "__unfiled__";
        (fileGroups[fp] ||= []).push(n);
      }

      const sortedFiles = Object.keys(fileGroups).sort();
      const graphWidthPx = document.getElementById("graph")?.clientWidth || 1200;
      const inferredRowWidth =
        (graphWidthPx / LAYOUT.PX_PER_UNIT) * LAYOUT.WRAP_FILL_RATIO;
      const targetRowWidth = Math.max(
        LAYOUT.WRAP_TARGET_MIN_WIDTH,
        Math.min(
          LAYOUT.WRAP_TARGET_MAX_WIDTH,
          Math.max(LAYOUT.WRAP_TARGET_WIDTH, inferredRowWidth),
        ),
      );

      const fileColumns = sortedFiles.map((fp, fileIndex) => {
        const group = fileGroups[fp];
        group.sort((a, b) =>
          (depthOf[a.node_id] - depthOf[b.node_id]) ||
          (a.start_line - b.start_line) ||
          a.name.localeCompare(b.name)
        );

        let maxPx = 0;
        for (const n of group) {
          const px = measureLabelWidth(n._displayLabel || n.name);
          if (px > maxPx) maxPx = px;
        }
        const width = Math.max(
          LAYOUT.MIN_COL_WIDTH,
          maxPx / LAYOUT.PX_PER_UNIT + LAYOUT.COL_WIDTH_BIAS,
        );

        const parsedLines = group.map((n, idx) => {
          const raw = Number(n.start_line);
          return Number.isFinite(raw) && raw > 0 ? raw : idx + 1;
        });
        const minLine = Math.min(...parsedLines);
        const maxLine = Math.max(...parsedLines);
        const range = Math.max(1, maxLine - minLine);
        const sameLineCounts = new Map();
        const localOffsets = new Map();
        let maxLocalOffset = 0;

        for (let slotIndex = 0; slotIndex < group.length; slotIndex++) {
          const n = group[slotIndex];
          const startLine = parsedLines[slotIndex];
          const lineNorm =
            range > 0
              ? (startLine - minLine) / range
              : (group.length > 1 ? slotIndex / (group.length - 1) : 0);
          const lineKey = Math.round(lineNorm * 1000);
          const sameLineIndex = sameLineCounts.get(lineKey) || 0;
          sameLineCounts.set(lineKey, sameLineIndex + 1);

          const depthOffset = depthOf[n.node_id] * LAYOUT.DEPTH_Y_WEIGHT;
          const lineOffset = lineNorm * LAYOUT.FILE_LINE_SPAN;
          const duplicateOffset = sameLineIndex * LAYOUT.SUB_ROW_HEIGHT;
          const slotOffset = slotIndex * LAYOUT.MIN_NODE_GAP_Y;
          const colStagger = (fileIndex % 4) * LAYOUT.COL_Y_STAGGER;
          const localOffset = depthOffset + lineOffset + duplicateOffset + slotOffset + colStagger;
          localOffsets.set(n.node_id, localOffset);
          if (localOffset > maxLocalOffset) maxLocalOffset = localOffset;
        }

        return {
          filePath: fp,
          nodes: group,
          width,
          height: maxLocalOffset + LAYOUT.ROW_BASE_PAD,
          localOffsets,
          rowIndex: -1,
          x: 0,
        };
      });

      const rows = [];
      let activeRow = { columns: [], width: 0, height: 0 };
      for (const column of fileColumns) {
        const projectedWidth =
          activeRow.columns.length === 0
            ? column.width
            : activeRow.width + LAYOUT.COL_PAD + column.width;
        if (activeRow.columns.length > 0 && projectedWidth > targetRowWidth) {
          rows.push(activeRow);
          activeRow = { columns: [], width: 0, height: 0 };
        }
        if (activeRow.columns.length > 0) {
          activeRow.width += LAYOUT.COL_PAD;
        }
        activeRow.columns.push(column);
        activeRow.width += column.width;
        activeRow.height = Math.max(activeRow.height, column.height);
      }
      if (activeRow.columns.length > 0) rows.push(activeRow);

      const positions = new Map();
      let rowOffset = 0;
      for (let rowIndex = 0; rowIndex < rows.length; rowIndex++) {
        const row = rows[rowIndex];
        const rowBaseY = -rowOffset;
        let xCursor = -(row.width / 2);
        for (const column of row.columns) {
          xCursor += column.width / 2;
          column.x = xCursor;
          column.rowIndex = rowIndex;
          for (const node of column.nodes) {
            const localOffset = column.localOffsets.get(node.node_id) || 0;
            positions.set(node.node_id, { x: column.x, y: rowBaseY - localOffset });
          }
          xCursor += column.width / 2 + LAYOUT.COL_PAD;
        }
        rowOffset += row.height + LAYOUT.ROW_BAND_GAP;
      }

      for (const row of rows) {
        let previousRight = Number.NEGATIVE_INFINITY;
        for (const column of row.columns) {
          const left = column.x - column.width / 2;
          const minLeft =
            previousRight === Number.NEGATIVE_INFINITY
              ? left
              : previousRight + LAYOUT.MIN_COLUMN_SEPARATION;
          if (left < minLeft) {
            const delta = minLeft - left;
            column.x += delta;
            for (const node of column.nodes) {
              const pos = positions.get(node.node_id);
              if (pos) pos.x += delta;
            }
          }
          previousRight = column.x + column.width / 2;
        }
      }

      const boxes = computeBoundingBoxes(directories, positions, nodeById, depthOf);
      return { positions, boxes, directories };
    }

    function layoutNodesV5Component(nodes, nodeById, edges) {
      const depthOf = computeNodeDepths(nodes, nodeById);
      const directories = buildDirectorySet(nodes, nodeById);
      const contentNodes = nodes.filter((node) => node.node_type !== "directory");

      const { components } = computeConnectedComponents(contentNodes, edges || []);
      if (components.length === 0) {
        return { positions: new Map(), boxes: new Map(), directories, zoneByNode: new Map() };
      }

      const componentIndexByNode = new Map();
      components.forEach((ids, index) => {
        for (const nodeId of ids) {
          componentIndexByNode.set(nodeId, index);
        }
      });

      const componentStats = new Map();
      components.forEach((ids, index) => {
        let nonVirtualNodes = 0;
        for (const nodeId of ids) {
          const node = nodeById[nodeId];
          if (node && node.node_type !== "virtual") nonVirtualNodes += 1;
        }
        componentStats.set(index, {
          internalEdges: 0,
          crossFileEdges: 0,
          nonVirtualNodes,
        });
      });

      for (const edge of edges || []) {
        if (edge.edge_type === "contains") continue;
        const sourceIndex = componentIndexByNode.get(edge.from_id);
        const targetIndex = componentIndexByNode.get(edge.to_id);
        if (sourceIndex === undefined || targetIndex === undefined) continue;
        if (sourceIndex !== targetIndex) continue;
        const stats = componentStats.get(sourceIndex);
        if (!stats) continue;
        stats.internalEdges += 1;
        const sourcePath = nodeById[edge.from_id]?.file_path || "";
        const targetPath = nodeById[edge.to_id]?.file_path || "";
        if (sourcePath && targetPath && sourcePath !== targetPath) {
          stats.crossFileEdges += 1;
        }
      }

      const componentLayouts = components.map((ids, index) => {
        const componentNodes = ids.map((id) => nodeById[id]).filter(Boolean);
        const localLayout = layoutNodesV4FileWrap(componentNodes, nodeById, depthOf);
        const bounds = computePositionBounds(localLayout.positions, nodeById);
        const stats = componentStats.get(index) || { internalEdges: 0, crossFileEdges: 0, nonVirtualNodes: 0 };
        return {
          ids,
          positions: localLayout.positions,
          bounds,
          score: componentScore({ ids }, stats),
          stats,
        };
      });

      const sortedComponents = [...componentLayouts].sort(
        (a, b) => (b.score - a.score) || a.ids[0].localeCompare(b.ids[0]),
      );
      const adjacency = new Map();
      for (const edge of edges || []) {
        if (edge.edge_type === "contains") continue;
        if (!adjacency.has(edge.from_id)) adjacency.set(edge.from_id, new Set());
        if (!adjacency.has(edge.to_id)) adjacency.set(edge.to_id, new Set());
        adjacency.get(edge.from_id).add(edge.to_id);
        adjacency.get(edge.to_id).add(edge.from_id);
      }
      const coreComponents = [];
      const peripheralComponents = [];
      for (const component of sortedComponents) {
        const isCore =
          component.score >= LAYOUT.CORE_COMPONENT_MIN_SCORE ||
          component.stats.internalEdges > 0 ||
          component.ids.length > 1;
        if (isCore) coreComponents.push(component);
        else peripheralComponents.push(component);
      }
      if (coreComponents.length === 0 && peripheralComponents.length > 0) {
        coreComponents.push(peripheralComponents.shift());
      }
      const coreNodeIds = new Set();
      for (const component of coreComponents) {
        for (const nodeId of component.ids) coreNodeIds.add(nodeId);
      }
      let refinedPeripheral = [...peripheralComponents];
      let changed = true;
      let safety = 0;
      while (changed && safety < 8) {
        changed = false;
        safety += 1;
        const nextPeripheral = [];
        for (const component of refinedPeripheral) {
          let promoteToCore = false;
          for (const nodeId of component.ids) {
            const neighbors = adjacency.get(nodeId);
            if (!neighbors || neighbors.size === 0) continue;
            for (const neighborId of neighbors) {
              if (coreNodeIds.has(neighborId)) {
                promoteToCore = true;
                break;
              }
            }
            if (promoteToCore) break;
          }
          if (promoteToCore) {
            coreComponents.push(component);
            for (const nodeId of component.ids) coreNodeIds.add(nodeId);
            changed = true;
          } else {
            nextPeripheral.push(component);
          }
        }
        refinedPeripheral = nextPeripheral;
      }
      peripheralComponents.length = 0;
      peripheralComponents.push(...refinedPeripheral);

      const graphWidthPx = document.getElementById("graph")?.clientWidth || 1200;
      const inferredPackWidth =
        (graphWidthPx / LAYOUT.PX_PER_UNIT) * LAYOUT.COMPONENT_PACK_FILL_RATIO;
      const targetPackWidth = Math.max(
        LAYOUT.COMPONENT_PACK_MIN_WIDTH,
        Math.min(LAYOUT.COMPONENT_PACK_MAX_WIDTH, inferredPackWidth),
      );

      const placements = [];
      const placeGroup = (componentsToPlace, zone, originY = 0, packWidth = targetPackWidth, gapX = LAYOUT.COMPONENT_GAP_X, gapY = LAYOUT.COMPONENT_GAP_Y) => {
        let xCursor = 0;
        let rowTop = originY;
        let rowHeight = 0;
        for (const component of componentsToPlace) {
          const width = component.bounds.width;
          const height = component.bounds.height;
          const projectedWidth = xCursor === 0 ? width : xCursor + gapX + width;
          if (xCursor > 0 && projectedWidth > packWidth) {
            xCursor = 0;
            rowTop -= rowHeight + gapY;
            rowHeight = 0;
          }
          if (xCursor > 0) xCursor += gapX;
          const tx = xCursor - component.bounds.minX;
          const ty = rowTop - component.bounds.maxY;
          placements.push({ component, tx, ty, zone });
          xCursor += width;
          rowHeight = Math.max(rowHeight, height);
        }
      };

      placeGroup(coreComponents, "core", 0, targetPackWidth, LAYOUT.COMPONENT_GAP_X, LAYOUT.COMPONENT_GAP_Y);
      const coreBounds = computePlacementBounds(placements);

      if (peripheralComponents.length > 0) {
        const dockWidth = Math.min(
          LAYOUT.PERIPHERAL_DOCK_MAX_WIDTH,
          Math.max(targetPackWidth * 0.9, coreBounds.width),
        );
        const densityPenalty = Math.min(1.2, peripheralComponents.length / 8);
        const adaptiveGap = LAYOUT.PERIPHERAL_DOCK_GAP_Y + coreBounds.height * 0.02 - densityPenalty * 0.45;
        const dockGapY = Math.max(
          LAYOUT.ZONE_GAP_MIN_UNITS,
          Math.min(LAYOUT.ZONE_GAP_MAX_UNITS, adaptiveGap),
        );
        const dockOriginY = coreBounds.minY - dockGapY;
        const dockAnchorX = coreBounds.centerX - dockWidth / 2;
        let xCursor = 0;
        let rowTop = dockOriginY;
        let rowHeight = 0;
        for (const component of peripheralComponents) {
          const cellWidth = peripheralComponentCellWidth(component, nodeById);
          const cellHeight = Math.max(component.bounds.height, LAYOUT.ROW_HEIGHT * 3);
          const projectedWidth =
            xCursor === 0
              ? cellWidth
              : xCursor + LAYOUT.PERIPHERAL_GRID_GAP_X + cellWidth;
          if (xCursor > 0 && projectedWidth > dockWidth) {
            xCursor = 0;
            rowTop -= rowHeight + LAYOUT.PERIPHERAL_GRID_GAP_Y;
            rowHeight = 0;
          }
          if (xCursor > 0) xCursor += LAYOUT.PERIPHERAL_GRID_GAP_X;
          const cellCenterX = dockAnchorX + xCursor + cellWidth / 2;
          const componentCenterX = (component.bounds.minX + component.bounds.maxX) / 2;
          const tx = cellCenterX - componentCenterX;
          const ty = rowTop - component.bounds.maxY;
          placements.push({ component, tx, ty, zone: "peripheral", cellWidth });
          xCursor += cellWidth;
          rowHeight = Math.max(rowHeight, cellHeight);
        }
      }

      const positions = new Map();
      const zoneByNode = new Map();
      for (const placement of placements) {
        for (const [nodeId, pos] of placement.component.positions) {
          positions.set(nodeId, { x: pos.x + placement.tx, y: pos.y + placement.ty });
          zoneByNode.set(nodeId, placement.zone);
        }
      }

      const coreBoundsBeforeScale = computeZoneBounds(positions, zoneByNode, "core", nodeById);
      const allBoundsBeforeScale = computePositionBounds(positions, nodeById);
      const coreHeight = coreBoundsBeforeScale.height || 0;
      const allHeight = allBoundsBeforeScale.height || 0;
      const currentCoreRatio = allHeight > 0 ? coreHeight / allHeight : 1;
      if (coreHeight > 0 && allHeight > 0 && currentCoreRatio < LAYOUT.CORE_ZONE_MIN_VERTICAL_RATIO) {
        const peripheralHeight = Math.max(0, allHeight - coreHeight);
        const desiredScale =
          (LAYOUT.CORE_ZONE_MIN_VERTICAL_RATIO * peripheralHeight) /
          (coreHeight * (1 - LAYOUT.CORE_ZONE_MIN_VERTICAL_RATIO));
        const yScale = Math.max(1, Math.min(LAYOUT.CORE_ZONE_SCALE_MAX, Number.isFinite(desiredScale) ? desiredScale : 1));
        if (yScale > 1.01) {
          for (const [nodeId, pos] of positions) {
            if ((zoneByNode.get(nodeId) || "core") !== "core") continue;
            pos.y = coreBoundsBeforeScale.centerY + (pos.y - coreBoundsBeforeScale.centerY) * yScale;
          }
        }
      }

      normalizeCoreAspect(positions, zoneByNode, nodeById);
      enforceZoneGap(positions, zoneByNode, nodeById);
      normalizeLayoutOccupancy(positions, nodeById);
      enforceZoneGap(positions, zoneByNode, nodeById);
      const boxes = computeBoundingBoxes(directories, positions, nodeById, depthOf);
      const coreZoneBounds = computeZoneBounds(positions, zoneByNode, "core", nodeById);
      const peripheralBounds = computeZoneBounds(positions, zoneByNode, "peripheral", nodeById);
      const separatorY =
        peripheralBounds.height > 0 && coreZoneBounds.height > 0
          ? (coreZoneBounds.minY + peripheralBounds.maxY) / 2
          : null;
      return { positions, boxes, directories, zoneByNode, coreBounds: coreZoneBounds, peripheralBounds, separatorY };
    }

    function layoutNodes(nodes, nodeById, edges) {
      if (LAYOUT_MODE === "v4_file_wrap") {
        return layoutNodesV4FileWrap(nodes, nodeById);
      }
      return layoutNodesV5Component(nodes, nodeById, edges);
    }

    function isDescendantOf(nodeId, ancestorId, nodeById) {
      let current = nodeById[nodeId];
      let steps = 0;
      while (current && steps < 50) {
        if (current.parent_id === ancestorId) return true;
        current = current.parent_id ? nodeById[current.parent_id] : null;
        steps++;
      }
      return false;
    }

    function directoryDepth(dir, depthOf) {
      const explicit = depthOf[dir.node_id];
      if (Number.isFinite(explicit)) return explicit;
      const prefix = normalizePath(dir._path_prefix || dir.file_path || "");
      return prefix ? prefix.split("/").length : 0;
    }

    function nodeBelongsToDirectory(nodeId, dir, nodeById) {
      if (isDescendantOf(nodeId, dir.node_id, nodeById)) return true;
      const node = nodeById[nodeId];
      if (!node) return false;
      const nodePath = normalizePath(node.file_path || "");
      const dirPath = normalizePath(dir._path_prefix || dir.file_path || "");
      if (!nodePath || !dirPath) return false;
      return nodePath.startsWith(dirPath + "/");
    }

    function computeBoundingBoxes(directories, positions, nodeById, depthOf) {
      const sorted = [...directories].sort((a, b) =>
        (directoryDepth(b, depthOf) - directoryDepth(a, depthOf)) || a.name.localeCompare(b.name)
      );

      const boxes = new Map();
      for (const dir of sorted) {
        const xs = [];
        const ys = [];

        for (const [nid, pos] of positions) {
          if (nodeBelongsToDirectory(nid, dir, nodeById)) {
            xs.push(pos.x);
            ys.push(pos.y);
          }
        }

        for (const [did, box] of boxes) {
          if (nodeById[did]?.parent_id === dir.node_id) {
            xs.push(box.x);
            xs.push(box.x + box.w);
            ys.push(box.y);
            ys.push(box.y - box.h);
          }
        }

        if (xs.length === 0) continue;

        const minX = Math.min(...xs);
        const maxX = Math.max(...xs);
        const maxY = Math.max(...ys);
        const minY = Math.min(...ys);

        boxes.set(dir.node_id, {
          x: minX - LAYOUT.BOX_PAD,
          y: maxY + LAYOUT.BOX_PAD + LAYOUT.BOX_HEADER,
          w: (maxX - minX) + LAYOUT.BOX_PAD * 2,
          h: (maxY - minY) + LAYOUT.BOX_PAD * 2 + LAYOUT.BOX_HEADER,
          label: dir.name,
          depth: directoryDepth(dir, depthOf),
        });
      }

      return boxes;
    }

    function nodeColor(nodeType, status) {
      if (status === "running") return "#fb923c";
      if (status === "awaiting_input" || status === "awaiting_review") return "#fbbf24";
      if (status === "error") return "#f87171";
      return colorByType[nodeType] || "#818cf8";
    }

    let boundingBoxes = new Map();
    let coreZoneBounds = null;
    let zoneSeparatorY = null;
    let layoutMetricsRafId = null;
    let layoutMetricsTimerId = null;
    globalThis.__remora_layout_metrics = {
      ready: false,
      reason: "boot",
    };

    function estimateNodeLabelDimensionsPx(attrs) {
      if (!labelMeasureContext) {
        return { width: 72, height: 20 };
      }
      const text = String(attrs?.label || attrs?.node_id || "");
      const separatorIndex = text.indexOf("::");
      const hasQualifier = separatorIndex > 0;
      const primaryText = hasQualifier ? text.slice(separatorIndex + 2) : text;
      const qualifierText = hasQualifier ? text.slice(0, separatorIndex) : "";
      const isPeripheral = attrs?.layout_zone === "peripheral" && attrs?.node_id !== selectedNode;

      const primaryFontSize = isPeripheral ? 11 : 14;
      const qualifierFontSize = isPeripheral ? 9 : 10;
      const padX = isPeripheral ? 8 : 10;
      const padY = isPeripheral ? 4 : 5;
      const lineGap = hasQualifier ? 2 : 0;
      labelMeasureContext.font = "600 " + primaryFontSize + 'px "IBM Plex Mono", "IBM Plex Sans", sans-serif';
      const primaryWidth = labelMeasureContext.measureText(primaryText).width;
      let qualifierWidth = 0;
      if (hasQualifier) {
        labelMeasureContext.font = "500 " + qualifierFontSize + 'px "IBM Plex Mono", "IBM Plex Sans", sans-serif';
        qualifierWidth = labelMeasureContext.measureText(qualifierText).width;
      }
      const textWidth = Math.max(primaryWidth, qualifierWidth);
      const contentHeight = hasQualifier
        ? (primaryFontSize + qualifierFontSize + lineGap)
        : primaryFontSize;
      return {
        width: textWidth + padX * 2,
        height: contentHeight + padY * 2,
      };
    }

    function computeNodeLabelViewportRect(nodeId, attrs, pixelRatio) {
      const hitbox = nodeLabelHitboxes.get(nodeId);
      if (hitbox) {
        return {
          left: hitbox.x / pixelRatio,
          top: hitbox.y / pixelRatio,
          right: (hitbox.x + hitbox.width) / pixelRatio,
          bottom: (hitbox.y + hitbox.height) / pixelRatio,
          width: hitbox.width / pixelRatio,
          height: hitbox.height / pixelRatio,
        };
      }
      if (!renderer || !graph.hasNode(nodeId)) return null;
      const point = renderer.graphToViewport({ x: attrs.x, y: attrs.y });
      const size = estimateNodeLabelDimensionsPx(attrs);
      const width = Math.max(8, size.width);
      const height = Math.max(8, size.height);
      return {
        left: point.x - width / 2,
        top: point.y - height / 2,
        right: point.x + width / 2,
        bottom: point.y + height / 2,
        width,
        height,
      };
    }

    function updateLayoutMetrics(reason = "runtime") {
      if (!renderer || typeof renderer.getDimensions !== "function") {
        globalThis.__remora_layout_metrics = {
          ready: false,
          reason: "missing_renderer",
          updated_at_ms: Date.now(),
        };
        return;
      }

      const dims = renderer.getDimensions();
      const makeBox = () => ({
        minX: Number.POSITIVE_INFINITY,
        minY: Number.POSITIVE_INFINITY,
        maxX: Number.NEGATIVE_INFINITY,
        maxY: Number.NEGATIVE_INFINITY,
        count: 0,
      });
      const extendBox = (box, point) => {
        box.minX = Math.min(box.minX, point.x);
        box.minY = Math.min(box.minY, point.y);
        box.maxX = Math.max(box.maxX, point.x);
        box.maxY = Math.max(box.maxY, point.y);
        box.count += 1;
      };
      const boxHeight = (box) => (box.count > 0 ? Math.max(1, box.maxY - box.minY) : 0);

      const overallBox = makeBox();
      const coreBox = makeBox();
      const peripheralBox = makeBox();
      const pixelRatio = renderer.getRenderParams().pixelRatio || window.devicePixelRatio || 1;
      const filterRect = document.getElementById("filter-bar")?.getBoundingClientRect() || null;
      let coreLabelCount = 0;
      let coreClippedLabelCount = 0;
      let coreOccludedByFilterCount = 0;
      let applyTaxZone = null;

      graph.forEachNode((nodeId, attrs) => {
        if (attrs.hidden || attrs.node_type === "__label__") return;
        const point = renderer.graphToViewport({ x: attrs.x, y: attrs.y });
        extendBox(overallBox, point);
        const zone = attrs.layout_zone === "peripheral" ? "peripheral" : "core";
        if (zone === "core") {
          extendBox(coreBox, point);
        } else if (zone === "peripheral") {
          extendBox(peripheralBox, point);
        }
        if (String(nodeId).includes("apply_tax") && applyTaxZone === null) {
          applyTaxZone = attrs.layout_zone || "core";
        }
        if (zone !== "core") return;
        const rect = computeNodeLabelViewportRect(nodeId, attrs, pixelRatio);
        if (!rect) return;
        coreLabelCount += 1;
        const clipped =
          rect.left < 0 ||
          rect.top < 0 ||
          rect.right > dims.width ||
          rect.bottom > dims.height;
        if (clipped) coreClippedLabelCount += 1;
        if (filterRect) {
          const overlapW = Math.max(0, Math.min(rect.right, filterRect.right) - Math.max(rect.left, filterRect.left));
          const overlapH = Math.max(0, Math.min(rect.bottom, filterRect.bottom) - Math.max(rect.top, filterRect.top));
          if (overlapW > 0 && overlapH > 0) coreOccludedByFilterCount += 1;
        }
      });

      const overallHeight = boxHeight(overallBox);
      const coreCentroidX = coreBox.count > 0 ? (coreBox.minX + coreBox.maxX) / 2 : dims.width / 2;
      const coreCentroidY = coreBox.count > 0 ? (coreBox.minY + coreBox.maxY) / 2 : dims.height / 2;
      const zoneGapPx =
        coreBox.count > 0 && peripheralBox.count > 0
          ? peripheralBox.minY - coreBox.maxY
          : 0;
      const zoneGapRatio = overallHeight > 0 ? zoneGapPx / overallHeight : 0;
      let separatorY = null;
      let separatorVisible = false;
      if (Number.isFinite(zoneSeparatorY)) {
        const separatorPoint = renderer.graphToViewport({ x: 0, y: zoneSeparatorY });
        separatorY = separatorPoint.y;
        separatorVisible = separatorY >= -4 && separatorY <= dims.height + 4;
      }
      const sidebar = document.getElementById("sidebar");
      const sidebarWidthRatio =
        sidebar && window.innerWidth > 0
          ? sidebar.getBoundingClientRect().width / window.innerWidth
          : 0;

      globalThis.__remora_layout_metrics = {
        ready: true,
        reason,
        updated_at_ms: Date.now(),
        dims: { width: dims.width, height: dims.height, pixel_ratio: pixelRatio },
        core_zone_nodes: coreBox.count,
        peripheral_zone_nodes: peripheralBox.count,
        core_label_count: coreLabelCount,
        core_label_clipped_count: coreClippedLabelCount,
        core_occluded_by_filter_count: coreOccludedByFilterCount,
        core_centroid_x_ratio: dims.width > 0 ? coreCentroidX / dims.width : 0.5,
        core_centroid_y_ratio: dims.height > 0 ? coreCentroidY / dims.height : 0.5,
        zone_gap_px: zoneGapPx,
        zone_gap_ratio: zoneGapRatio,
        separator_y_px: separatorY,
        separator_visible: separatorVisible,
        sidebar_width_ratio: sidebarWidthRatio,
        apply_tax_zone: applyTaxZone,
      };
    }

    function scheduleLayoutMetricsUpdate(reason = "scheduled", delayMs = 0) {
      if (layoutMetricsTimerId) {
        clearTimeout(layoutMetricsTimerId);
        layoutMetricsTimerId = null;
      }
      if (layoutMetricsRafId) {
        cancelAnimationFrame(layoutMetricsRafId);
        layoutMetricsRafId = null;
      }
      layoutMetricsTimerId = setTimeout(() => {
        layoutMetricsTimerId = null;
        layoutMetricsRafId = requestAnimationFrame(() => {
          layoutMetricsRafId = null;
          updateLayoutMetrics(reason);
        });
      }, Math.max(0, delayMs));
    }

    function computeOverlayFitSafeInsetsPx() {
      const graphEl = document.getElementById("graph");
      if (!graphEl) {
        return {
          left: LAYOUT.FIT_SAFE_LEFT_PX,
          top: LAYOUT.FIT_SAFE_TOP_PX,
          right: LAYOUT.FIT_SAFE_RIGHT_PX,
          bottom: LAYOUT.FIT_SAFE_BOTTOM_PX,
        };
      }
      const graphRect = graphEl.getBoundingClientRect();
      const graphWidth = Math.max(1, graphRect.width);
      const graphHeight = Math.max(1, graphRect.height);
      const graphMidX = graphRect.left + graphRect.width / 2;
      const graphMidY = graphRect.top + graphRect.height / 2;
      const safe = {
        left: LAYOUT.FIT_SAFE_LEFT_PX,
        top: LAYOUT.FIT_SAFE_TOP_PX,
        right: LAYOUT.FIT_SAFE_RIGHT_PX,
        bottom: LAYOUT.FIT_SAFE_BOTTOM_PX,
      };
      const overlays = [
        document.getElementById("filter-bar"),
        document.getElementById("zoom-controls"),
      ];
      for (const overlay of overlays) {
        if (!overlay) continue;
        const style = window.getComputedStyle(overlay);
        if (style.display === "none" || style.visibility === "hidden") continue;
        const rect = overlay.getBoundingClientRect();
        if (rect.width <= 0 || rect.height <= 0) continue;
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const pad = 12;
        const leftCandidate = rect.right - graphRect.left + pad;
        const rightCandidate = graphRect.right - rect.left + pad;
        const topCandidate =
          centerX <= graphMidX
            ? rect.height * 0.58 + 16
            : rect.bottom - graphRect.top + pad;
        const bottomCandidate =
          centerX <= graphMidX
            ? rect.height * 0.45 + 14
            : graphRect.bottom - rect.top + pad;

        if (centerX <= graphMidX) {
          safe.left = Math.max(safe.left, leftCandidate);
        } else {
          safe.right = Math.max(safe.right, rightCandidate);
        }
        if (centerY <= graphMidY) {
          safe.top = Math.max(safe.top, topCandidate);
        } else {
          safe.bottom = Math.max(safe.bottom, bottomCandidate);
        }
      }

      return {
        left: Math.min(graphWidth * 0.46, Math.max(0, safe.left)),
        top: Math.min(graphHeight * 0.42, Math.max(0, safe.top)),
        right: Math.min(graphWidth * 0.4, Math.max(0, safe.right)),
        bottom: Math.min(graphHeight * 0.38, Math.max(0, safe.bottom)),
      };
    }

    function applyFitSafeInsets(bbox, dims, safeInsetsPx) {
      if (!bbox || !dims || !safeInsetsPx) return bbox;
      const width = Math.max(1e-6, bbox.x[1] - bbox.x[0]);
      const height = Math.max(1e-6, bbox.y[1] - bbox.y[0]);
      const unitsPerPxX = width / Math.max(1, dims.width);
      const unitsPerPxY = height / Math.max(1, dims.height);
      return {
        x: [
          bbox.x[0] - safeInsetsPx.left * unitsPerPxX,
          bbox.x[1] + safeInsetsPx.right * unitsPerPxX,
        ],
        y: [
          bbox.y[0] - safeInsetsPx.bottom * unitsPerPxY,
          bbox.y[1] + safeInsetsPx.top * unitsPerPxY,
        ],
      };
    }

    function estimateNodeLabelSizeUnits(attrs) {
      const sizePx = estimateNodeLabelDimensionsPx(attrs);
      return {
        width: Math.max(8, sizePx.width) / LAYOUT.PX_PER_UNIT,
        height: Math.max(8, sizePx.height) / LAYOUT.PX_PER_UNIT,
      };
    }

    function computeGraphLabelBoundsByZone(zone = null) {
      let minX = Number.POSITIVE_INFINITY;
      let maxX = Number.NEGATIVE_INFINITY;
      let minY = Number.POSITIVE_INFINITY;
      let maxY = Number.NEGATIVE_INFINITY;

      graph.forEachNode((nodeId, attrs) => {
        if (attrs.hidden || attrs.node_type === "__label__") return;
        const nodeZone = attrs.layout_zone === "peripheral" ? "peripheral" : "core";
        if (zone && nodeZone !== zone) return;
        const size = estimateNodeLabelSizeUnits(attrs);
        const halfW = Math.max(2.6, size.width / 2);
        const halfH = Math.max(1.2, size.height / 2);
        minX = Math.min(minX, attrs.x - halfW);
        maxX = Math.max(maxX, attrs.x + halfW);
        minY = Math.min(minY, attrs.y - halfH);
        maxY = Math.max(maxY, attrs.y + halfH);
      });

      if (!Number.isFinite(minX) || !Number.isFinite(maxX) || !Number.isFinite(minY) || !Number.isFinite(maxY)) {
        return null;
      }
      return {
        minX,
        maxX,
        minY,
        maxY,
        width: Math.max(1e-6, maxX - minX),
        height: Math.max(1e-6, maxY - minY),
        centerX: (minX + maxX) / 2,
        centerY: (minY + maxY) / 2,
      };
    }

    function computeFitBBox() {
      const coreLabelBounds = computeGraphLabelBoundsByZone("core");
      const peripheralLabelBounds = computeGraphLabelBoundsByZone("peripheral");
      if (coreLabelBounds) {
        const coreBBox = {
          x: [
            coreLabelBounds.minX - LAYOUT.FIT_MARGIN_LEFT_UNITS,
            coreLabelBounds.maxX + LAYOUT.FIT_MARGIN_RIGHT_UNITS,
          ],
          y: [
            coreLabelBounds.minY - LAYOUT.FIT_MARGIN_BOTTOM_UNITS,
            coreLabelBounds.maxY + LAYOUT.FIT_MARGIN_TOP_UNITS,
          ],
        };
        if (peripheralLabelBounds) {
          const maxPeripheralXContribution = Math.max(8, coreLabelBounds.width * 0.52);
          const maxPeripheralYContribution = Math.max(7, coreLabelBounds.height * 0.72);
          coreBBox.x[0] = Math.min(
            coreBBox.x[0],
            Math.max(
              peripheralLabelBounds.minX - LAYOUT.FIT_MARGIN_LEFT_UNITS * 0.45,
              coreLabelBounds.centerX - maxPeripheralXContribution,
            ),
          );
          coreBBox.x[1] = Math.max(
            coreBBox.x[1],
            Math.min(
              peripheralLabelBounds.maxX + LAYOUT.FIT_MARGIN_RIGHT_UNITS * 0.45,
              coreLabelBounds.centerX + maxPeripheralXContribution,
            ),
          );
          coreBBox.y[0] = Math.min(
            coreBBox.y[0],
            Math.max(
              peripheralLabelBounds.minY - LAYOUT.FIT_MARGIN_BOTTOM_UNITS * 0.35,
              coreLabelBounds.minY - maxPeripheralYContribution,
            ),
          );
        }
        const safeInsetsPx = computeOverlayFitSafeInsetsPx();
        return applyFitSafeInsets(coreBBox, renderer.getDimensions(), safeInsetsPx);
      }

      let minX = Number.POSITIVE_INFINITY;
      let maxX = Number.NEGATIVE_INFINITY;
      let minY = Number.POSITIVE_INFINITY;
      let maxY = Number.NEGATIVE_INFINITY;
      const visibleLabelWidthsPx = [];

      graph.forEachNode((nodeId, attrs) => {
        if (attrs.hidden) return;
        const labelWidthPx = measureLabelWidth(attrs.label || attrs.node_id || nodeId);
        const labelWidth = labelWidthPx / LAYOUT.PX_PER_UNIT;
        visibleLabelWidthsPx.push(labelWidthPx);
        const halfW = Math.max(2.6, labelWidth / 2);
        const halfH = 1.25;
        minX = Math.min(minX, attrs.x - halfW);
        maxX = Math.max(maxX, attrs.x + halfW);
        minY = Math.min(minY, attrs.y - halfH);
        maxY = Math.max(maxY, attrs.y + halfH);
      });

      if (filterState.showBoundingBoxes) {
        for (const [, box] of boundingBoxes) {
          minX = Math.min(minX, box.x);
          maxX = Math.max(maxX, box.x + box.w);
          minY = Math.min(minY, box.y - box.h);
          maxY = Math.max(maxY, box.y);
        }
      }

      if (!Number.isFinite(minX) || !Number.isFinite(maxX) || !Number.isFinite(minY) || !Number.isFinite(maxY)) {
        return null;
      }

      minX -= LAYOUT.FIT_MARGIN_LEFT_UNITS;
      maxX += LAYOUT.FIT_MARGIN_RIGHT_UNITS;
      minY -= LAYOUT.FIT_MARGIN_BOTTOM_UNITS;
      maxY += LAYOUT.FIT_MARGIN_TOP_UNITS;

      const graphEl = document.getElementById("graph");
      const graphWidthPx = graphEl?.clientWidth || 1200;
      if (visibleLabelWidthsPx.length > 0 && graphWidthPx > 0) {
        const sortedWidths = [...visibleLabelWidthsPx].sort((a, b) => a - b);
        const mid = Math.floor(sortedWidths.length / 2);
        const medianLabelPx =
          sortedWidths.length % 2 === 0
            ? (sortedWidths[mid - 1] + sortedWidths[mid]) / 2
            : sortedWidths[mid];
        const maxReadableWidthUnits =
          (graphWidthPx / LAYOUT.FIT_MIN_MEDIAN_LABEL_PX) *
          (medianLabelPx / LAYOUT.PX_PER_UNIT);
        const fitWidthUnits = maxX - minX;
        if (fitWidthUnits > maxReadableWidthUnits && maxReadableWidthUnits > 0) {
          const cx = (minX + maxX) / 2;
          const half = maxReadableWidthUnits / 2;
          minX = cx - half;
          maxX = cx + half;
        }
      }

      const safeInsetsPx = computeOverlayFitSafeInsetsPx();
      return applyFitSafeInsets({ x: [minX, maxX], y: [minY, maxY] }, renderer.getDimensions(), safeInsetsPx);
    }

    function applyCustomFit(duration = 200) {
      const camera = renderer.getCamera();
      const bbox = computeFitBBox();
      renderer.setCustomBBox(bbox || null);
      const resetDuration = Math.max(0, duration);
      camera.animatedReset({ duration: resetDuration });
      if (resetDuration === 0) renderer.refresh();
      scheduleLayoutMetricsUpdate("fit", resetDuration + 20);
    }

    async function loadGraph() {
      const nodesResp = await fetch("/api/nodes");
      const nodes = await nodesResp.json();
      const edgeResp = await fetch("/api/edges");
      const edges = await edgeResp.json();
      const nodeById = Object.fromEntries(nodes.map((n) => [n.node_id, n]));

      qualifyLabels(nodes, nodeById);
      const layout = layoutNodes(nodes, nodeById, edges);

      const allPositions = [...layout.positions.values()];
      if (allPositions.length > 0) {
        let sumX = 0;
        let sumY = 0;
        for (const pos of allPositions) {
          sumX += pos.x;
          sumY += pos.y;
        }
        const cx = sumX / allPositions.length;
        const cy = sumY / allPositions.length;

        for (const [, pos] of layout.positions) {
          pos.x -= cx;
          pos.y -= cy;
        }
        for (const [, box] of layout.boxes) {
          box.x -= cx;
          box.y -= cy;
        }
        if (layout.coreBounds) {
          layout.coreBounds = {
            ...layout.coreBounds,
            minX: layout.coreBounds.minX - cx,
            maxX: layout.coreBounds.maxX - cx,
            minY: layout.coreBounds.minY - cy,
            maxY: layout.coreBounds.maxY - cy,
            centerX: layout.coreBounds.centerX - cx,
            centerY: layout.coreBounds.centerY - cy,
          };
        }
        if (Number.isFinite(layout.separatorY)) {
          layout.separatorY -= cy;
        }
      }

      boundingBoxes = layout.boxes;
      coreZoneBounds = layout.coreBounds || null;
      zoneSeparatorY = Number.isFinite(layout.separatorY) ? layout.separatorY : null;
      const previousNodePositions = new Map();
      graph.forEachNode((nodeId, attrs) => {
        previousNodePositions.set(nodeId, { x: attrs.x, y: attrs.y });
      });
      const hadExistingNodes = previousNodePositions.size > 0;
      graph.clear();
      const animationTargets = {};

      for (const node of nodes) {
        if (node.node_type === "directory") continue;
        const pos = layout.positions.get(node.node_id);
        if (!pos) continue;
        const layoutZone = layout.zoneByNode.get(node.node_id) || "core";
        const baseNodeSize = layoutZone === "peripheral" ? 1.92 : 2.4;
        const previousPos = previousNodePositions.get(node.node_id);
        const startX = previousPos ? previousPos.x : pos.x;
        const startY = previousPos ? previousPos.y : pos.y;
        graph.addNode(node.node_id, {
          node_id: node.node_id,
          label: node._displayLabel || node.name,
          forceLabel: true,
          size: baseNodeSize,
          x: startX,
          y: startY,
          color: nodeColor(node.node_type, node.status),
          peripheral_color: colorWithAlpha(nodeColor(node.node_type, node.status), 0.52),
          layout_zone: layoutZone,
          node_type: node.node_type,
          file_path: node.file_path || "",
          status: node.status,
        });
        animationTargets[node.node_id] = { x: pos.x, y: pos.y };
      }

      const preparedEdges = [];
      let maxEdgeDistance = 1;
      for (const edge of edges) {
        if (edge.edge_type === "contains") continue;
        if (!graph.hasNode(edge.from_id) || !graph.hasNode(edge.to_id)) continue;
        const sourcePos = layout.positions.get(edge.from_id);
        const targetPos = layout.positions.get(edge.to_id);
        const distance = sourcePos && targetPos
          ? Math.hypot(sourcePos.x - targetPos.x, sourcePos.y - targetPos.y)
          : 0;
        maxEdgeDistance = Math.max(maxEdgeDistance, distance);
        preparedEdges.push({ edge, distance });
      }

      const degreeByNode = new Map();
      graph.forEachNode((nodeId) => {
        degreeByNode.set(nodeId, 0);
      });
      const addedCoreEdgeRecords = [];

      for (const item of preparedEdges) {
        const edge = item.edge;
        const key = edge.from_id + "->" + edge.to_id + ":" + edge.edge_type;
        if (graph.hasEdge(key)) continue;
        const sourcePath = graph.getNodeAttribute(edge.from_id, "file_path") || "";
        const targetPath = graph.getNodeAttribute(edge.to_id, "file_path") || "";
        const isCrossFile = !!sourcePath && !!targetPath && sourcePath !== targetPath;
        const sourceZone = layout.zoneByNode.get(edge.from_id) || "core";
        const targetZone = layout.zoneByNode.get(edge.to_id) || "core";
        const layoutZone =
          sourceZone === "peripheral" && targetZone === "peripheral"
            ? "peripheral"
            : (sourceZone === targetZone ? sourceZone : "cross-zone");
        graph.addEdgeWithKey(key, edge.from_id, edge.to_id, {
          label: edge.edge_type,
          size: 1,
          source_file_path: sourcePath,
          target_file_path: targetPath,
          is_cross_file: isCrossFile,
          source_zone: sourceZone,
          target_zone: targetZone,
          layout_zone: layoutZone,
          length_norm: item.distance / maxEdgeDistance,
          visual_type:
            edge.edge_type === "imports" && isCrossFile && edgeCurveProgram ? "curve" : "arrow",
        });
        addedCoreEdgeRecords.push({
          key,
          fromId: edge.from_id,
          toId: edge.to_id,
          isCrossFile,
        });
        degreeByNode.set(edge.from_id, (degreeByNode.get(edge.from_id) || 0) + 1);
        degreeByNode.set(edge.to_id, (degreeByNode.get(edge.to_id) || 0) + 1);
      }

      const primaryCoreEdgeKeys = computePrimaryCoreEdgeKeys(
        addedCoreEdgeRecords,
        degreeByNode,
        layout.zoneByNode || new Map(),
      );
      for (const edgeKey of primaryCoreEdgeKeys) {
        if (graph.hasEdge(edgeKey)) {
          graph.setEdgeAttribute(edgeKey, "is_primary_chain", true);
        }
      }

      const fileRepresentative = new Map();
      graph.forEachNode((nodeId, attrs) => {
        const filePath = attrs.file_path || "";
        if (!filePath) return;
        const degree = degreeByNode.get(nodeId) || 0;
        const existing = fileRepresentative.get(filePath);
        if (!existing || degree > existing.degree) {
          fileRepresentative.set(filePath, { nodeId, degree });
        }
      });

      const rootCandidates = new Map();
      graph.forEachNode((nodeId, attrs) => {
        const degree = degreeByNode.get(nodeId) || 0;
        if (degree <= 0) return;
        const root = nodePathRoot({ file_path: attrs.file_path || "" });
        const existing = rootCandidates.get(root);
        if (!existing || degree > existing.degree) {
          rootCandidates.set(root, { nodeId, degree });
        }
      });

      for (const [nodeId, degree] of degreeByNode.entries()) {
        if (degree > 0) continue;
        if (!graph.hasNode(nodeId)) continue;
        const filePath = graph.getNodeAttribute(nodeId, "file_path") || "";
        let anchorId = fileRepresentative.get(filePath)?.nodeId || null;
        if (anchorId === nodeId) anchorId = null;
        if (!anchorId) {
          const root = nodePathRoot({ file_path: filePath });
          const fallback = rootCandidates.get(root)?.nodeId || null;
          if (fallback && fallback !== nodeId) anchorId = fallback;
        }
        if (!anchorId || !graph.hasNode(anchorId)) continue;
        const key = "__context_tether__:" + anchorId + "->" + nodeId;
        if (graph.hasEdge(key)) continue;
        const sourcePath = graph.getNodeAttribute(anchorId, "file_path") || "";
        const targetPath = filePath;
        const sourceZone = graph.getNodeAttribute(anchorId, "layout_zone") || "core";
        const targetZone = graph.getNodeAttribute(nodeId, "layout_zone") || "core";
        const layoutZone =
          sourceZone === "peripheral" && targetZone === "peripheral"
            ? "peripheral"
            : (sourceZone === targetZone ? sourceZone : "cross-zone");
        graph.addEdgeWithKey(key, anchorId, nodeId, {
          label: "context_tether",
          size: 1,
          source_file_path: sourcePath,
          target_file_path: targetPath,
          is_cross_file: !!sourcePath && !!targetPath && sourcePath !== targetPath,
          source_zone: sourceZone,
          target_zone: targetZone,
          layout_zone: layoutZone,
          is_context_tether: true,
          length_norm: 0.5,
          visual_type: "line",
        });
      }

      applyFilters();
      renderer.refresh();
      const canAnimate =
        hadExistingNodes &&
        typeof sigmaAnimateNodes === "function" &&
        Object.keys(animationTargets).length > 0;
      if (canAnimate) {
        sigmaAnimateNodes(graph, animationTargets, {
          duration: 500,
          easing: "cubicInOut",
        });
      }
      applyCustomFit(canAnimate ? 220 : 120);
    }

    function appendEventLine(text) {
      const box = document.getElementById("events");
      box.textContent = `${text}\n${box.textContent}`.slice(0, 4000);
    }

    function cacheEvent(eventType, payload) {
      const agentId = payload?.agent_id || payload?.from_agent || payload?.to_agent;
      if (!agentId) return;
      if (!agentEventCache.has(agentId)) {
        agentEventCache.set(agentId, []);
      }
      const cache = agentEventCache.get(agentId);
      cache.push({ eventType, payload, timestamp: Date.now() });
      if (cache.length > CACHE_LIMIT) cache.shift();
    }

    function renderSimpleDiff(oldSource, newSource) {
      const oldLines = String(oldSource || "").split("\n");
      const newLines = String(newSource || "").split("\n");
      const maxLen = Math.max(oldLines.length, newLines.length);
      const out = [];
      for (let i = 0; i < maxLen; i++) {
        const oldLine = oldLines[i] ?? "";
        const newLine = newLines[i] ?? "";
        if (oldLine === newLine) {
          out.push(`  ${oldLine}`);
        } else {
          if (oldLine) out.push(`- ${oldLine}`);
          if (newLine) out.push(`+ ${newLine}`);
        }
      }
      return out.join("\n");
    }

function addTimelineEvent(eventType, payload) {
    const timestamp = Number(payload?.timestamp) || (Date.now() / 1000);
    const agent = payload?.agent_id || payload?.from_agent || payload?.to_agent || "?";
    const summary = payload?.digest_summary || payload?.summary || payload?.content || payload?.node_id || "";
      timelineEvents.push({
        eventType: eventType || "Event",
        timestamp,
        agent,
        summary: String(summary).slice(0, 240),
      });
      if (timelineEvents.length > MAX_TIMELINE_EVENTS) {
        timelineEvents.shift();
      }
      renderTimeline();
    }

    function renderTimeline() {
      const container = document.getElementById("timeline-container");
      if (!container) return;
      container.innerHTML = timelineEvents
        .slice()
        .reverse()
        .map((entry) => {
          const time = new Date(entry.timestamp * 1000).toLocaleTimeString();
          return (
            `<div class=\"timeline-event type-${escapeHtml(entry.eventType)}\">` +
            `<div class=\"timeline-meta\">${escapeHtml(time)}</div>` +
            `<div class=\"timeline-type\">${escapeHtml(entry.eventType)}</div>` +
            `<div class=\"timeline-meta\">${escapeHtml(entry.agent)}</div>` +
            `<div>${escapeHtml(entry.summary)}</div>` +
            `</div>`
          );
        })
        .join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('\"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function renderAgentPanel(nodeId) {
      const header = document.getElementById("agent-header");
      const stream = document.getElementById("agent-stream");
      if (!nodeId) {
        header.textContent = "(select a node)";
        stream.innerHTML = "";
        return;
      }

      try {
        const response = await fetch(`/api/nodes/${encodeURIComponent(nodeId)}`);
        if (response.ok) {
          const node = await response.json();
          header.textContent = `${node.full_name} · ${node.node_type} · ${node.status}`;
        }
      } catch {
        header.textContent = `${nodeId} · unavailable`;
      }

      const events = agentEventCache.get(nodeId) || [];
      if (events.length === 0) {
        stream.innerHTML = "<div class=\"panel-item\">No events yet for this agent.</div>";
        return;
      }

      const items = events.slice(-60).map((entry) => {
        const eventType = entry.eventType;
        const payload = entry.payload || {};
        if (eventType === "agent_message" && payload.from_agent === "user") {
          return `<div class=\"panel-item panel-user\"><div class=\"panel-meta\">User</div>${escapeHtml(payload.content || "")}</div>`;
        }
        if (eventType === "agent_complete") {
          return `<div class=\"panel-item panel-agent\"><div class=\"panel-meta\">Agent Response</div>${escapeHtml(payload.full_response || payload.result_summary || "")}</div>`;
        }
        if (eventType === "agent_start") {
          return `<div class=\"panel-item\"><div class=\"panel-meta\">Agent Start</div>Turn started.</div>`;
        }
        if (eventType === "agent_error") {
          return `<div class=\"panel-item panel-error\"><div class=\"panel-meta\">Agent Error</div>${escapeHtml(payload.error || "")}</div>`;
        }
        if (eventType === "tool_result") {
          return `<div class=\"panel-item\"><div class=\"panel-meta\">Tool Result · ${escapeHtml(payload.tool_name || "")}</div>${escapeHtml(payload.result_summary || "")}</div>`;
        }
        if (eventType === "human_input_request") {
          const options = Array.isArray(payload.options) ? payload.options.join(", ") : "";
          return (
            `<div class=\"panel-item\" data-request-id=\"${escapeHtml(payload.request_id || "")}\">` +
            `<div class=\"panel-meta\">Human Input Needed</div>` +
            `<div>${escapeHtml(payload.question || "")}</div>` +
            (options ? `<div class=\"panel-meta\">Options: ${escapeHtml(options)}</div>` : "") +
            `<textarea data-request-input=\"${escapeHtml(payload.request_id || "")}\" rows=\"2\" placeholder=\"Type response...\"></textarea>` +
            `<button data-request-submit=\"${escapeHtml(payload.request_id || "")}\">Submit Response</button>` +
            `</div>`
          );
        }
        if (eventType === "rewrite_proposal") {
          return (
            `<div class=\"panel-item\" data-proposal-node=\"${escapeHtml(nodeId)}\">` +
            `<div class=\"panel-meta\">Rewrite Proposal</div>` +
            `<div>${escapeHtml(payload.reason || "Proposal ready for review.")}</div>` +
            `<div class=\"proposal-actions\">` +
            `<button data-proposal-diff=\"${escapeHtml(nodeId)}\">View Diff</button>` +
            `<button data-proposal-accept=\"${escapeHtml(nodeId)}\">Accept</button>` +
            `<button data-proposal-reject=\"${escapeHtml(nodeId)}\">Reject</button>` +
            `</div>` +
            `<div class=\"diff-block\" data-proposal-diff-output=\"${escapeHtml(nodeId)}\" style=\"display:none\"></div>` +
            `</div>`
          );
        }
        return `<div class=\"panel-item\"><div class=\"panel-meta\">${escapeHtml(eventType)}</div>${escapeHtml(JSON.stringify(payload))}</div>`;
      });

      stream.innerHTML = items.join("");
      stream.scrollTop = stream.scrollHeight;
    }

    async function showNode(nodeId) {

      if (!response.ok) return;
      const node = await response.json();

      details.appendChild(typeDiv);

      details.appendChild(fileDiv);

    function showEdge(edgeId) {
      if (!graph.hasEdge(edgeId)) return;
      const [sourceId, targetId] = graph.extremities(edgeId);
      const attrs = graph.getEdgeAttributes(edgeId);
      const sourceLabel = graph.getNodeAttribute(sourceId, "label") || sourceId;
      const targetLabel = graph.getNodeAttribute(targetId, "label") || targetId;
      document.getElementById("node-name").textContent = `${attrs.label || "edge"}: ${sourceLabel} -> ${targetLabel}`;
      const details = document.getElementById("node-details");
      details.innerHTML = "";

      const typeDiv = document.createElement("div");
      typeDiv.textContent = `Type: ${attrs.label || "unknown"}`;
      details.appendChild(typeDiv);

      const srcDiv = document.createElement("div");
      srcDiv.textContent = `Source: ${sourceLabel}`;
      details.appendChild(srcDiv);

      const tgtDiv = document.createElement("div");
      tgtDiv.textContent = `Target: ${targetLabel}`;
      details.appendChild(tgtDiv);

      const crossFileDiv = document.createElement("div");
      crossFileDiv.textContent = `Cross-file: ${attrs.is_cross_file ? "yes" : "no"}`;
      details.appendChild(crossFileDiv);
